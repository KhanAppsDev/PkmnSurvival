<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Island Mon Registry v6</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0b;
            --surface: #141417;
            --accent-cyan: #00f2ff;
            --accent-green: #39ff14;
            --accent-amber: #ffb100;
            --accent-red: #ff3e3e;
            --text: #e0e0e0;
            --border: #2a2a2e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            margin: 0; padding: 0; width: 100vw; overflow-x: hidden;
        }

        body::before {
            content: " "; display: block; position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9999; background-size: 100% 3px, 2px 100%; pointer-events: none;
        }

        header {
            padding: 10px 15px; border-bottom: 1px solid var(--accent-cyan);
            background: var(--surface); position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
        }

        .btn {
            background: transparent; border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan); padding: 6px 12px; cursor: pointer;
            font-family: inherit; font-size: 0.75rem; text-transform: uppercase;
        }

        #grid-view { padding: 15px; }
        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .search-bar {
            background: #000; border: 1px solid var(--border); color: var(--accent-green);
            padding: 12px; width: 100%; font-family: inherit; font-size: 1rem;
        }
        .filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
        .mon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 12px; }

        .mon-card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 12px; position: relative; display: flex; flex-direction: column; align-items: center;
        }
        .mon-card .name { font-size: 0.95rem; color: var(--accent-cyan); margin: 6px 0; text-transform: uppercase; }
        
        .card-previews {
            display: flex; gap: 4px; margin-top: 10px; padding-top: 10px;
            border-top: 1px solid var(--border); width: 100%; justify-content: center;
        }
        .mini-preview { 
            width: 46px; height: 46px; background: #000; image-rendering: pixelated; 
            border: 1px solid #222; display: block;
        }
        .prev-label { font-size: 0.5rem; color: #666; text-align: center; margin-top: 2px; }

        #detail-view { display: none; padding: 15px; padding-bottom: 50px; }
        .editor-section { background: var(--surface); padding: 15px; border: 1px solid var(--border); margin-bottom: 15px; }
        h3 { margin: 0 0 12px 0; font-size: 0.8rem; color: var(--accent-cyan); border-bottom: 1px solid var(--border); }
        
        .field-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.65rem; color: #888; margin-bottom: 4px; text-transform: uppercase; }
        input[type="text"] {
            width: 100%; background: #000; border: 1px solid var(--border); color: #fff; 
            padding: 10px; font-family: inherit; font-size: 0.9rem;
        }

        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .upload-zone {
            background: #000; border: 1px dashed var(--border); padding: 8px; font-size: 0.6rem;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .upload-zone.loaded { border-color: var(--accent-green); color: var(--accent-green); }

        .portrait-manager { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 10px; }
        .portrait-slot { 
            aspect-ratio: 1/1; background: #000; border: 1px solid var(--border); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 0.5rem; color: #555; cursor: pointer; position: relative;
            overflow: hidden;
        }
        .portrait-slot.active { border-color: var(--accent-green); color: var(--accent-green); }
        .portrait-slot img { width: 100%; height: 100%; object-fit: none; image-rendering: pixelated; }
        .slot-label { position: absolute; bottom: 2px; width: 100%; text-align: center; background: rgba(0,0,0,0.7); }

        .tabs { display: flex; overflow-x: auto; gap: 6px; margin-bottom: 12px; padding-bottom: 4px; }
        .tab { padding: 8px 14px; background: #000; border: 1px solid var(--border); font-size: 0.7rem; white-space: nowrap; }
        .tab.active { border-color: var(--accent-cyan); color: var(--accent-cyan); }
        
        #canvas-container {
            background: #000; border: 1px solid var(--border); display: flex; 
            justify-content: center; align-items: center; width: 100%; 
            aspect-ratio: 1/1; position: relative; overflow: hidden;
        }
        canvas { image-rendering: pixelated; }

        .filter-chip { padding: 5px 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 0.7rem; white-space: nowrap;}
        .filter-chip.active { border-color: var(--accent-cyan); background: rgba(0, 242, 255, 0.2); color: var(--accent-cyan); }

        .batch-btn {
            width: 100%; padding: 12px; margin-bottom: 15px;
            background: rgba(0, 242, 255, 0.1); border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan); font-family: inherit; font-weight: bold;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div style="color: var(--accent-cyan); font-weight: bold; font-size: 0.8rem;">REGISTRY_OS_V6</div>
    <div style="display: flex; gap: 8px;">
        <button class="btn" onclick="exportData()">Exp</button>
        <button class="btn" onclick="addNewMon()" style="border-color: var(--accent-green); color: var(--accent-green);">+ New</button>
    </div>
</header>

<div id="grid-view">
    <div class="controls">
        <input type="text" id="search" class="search-bar" placeholder="SEARCH_DATABASE..." oninput="renderGrid()">
        <div id="habitat-filters" class="filter-row"></div>
    </div>
    <div class="mon-grid" id="mon-grid"></div>
</div>

<div id="detail-view">
    <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
        <button class="btn" onclick="showGrid()">&lt; BACK</button>
        <button class="btn" onclick="deleteCurrentMon()" style="border-color: var(--accent-red); color: var(--accent-red);">WIPE</button>
    </div>

    <button class="batch-btn" onclick="document.getElementById('batch-input').click()">UPLOAD BATCH (SPRITES + XML)</button>
    <input type="file" id="batch-input" class="hidden" multiple onchange="handleBatchUpload(this.files)">

    <div class="editor-section">
        <h3>ENTITY_DATA</h3>
        <div class="field-group">
            <label>IDENTIFIER</label>
            <input type="text" id="edit-name" onchange="updateCurrentMon('name', this.value)">
        </div>
        <div class="field-group">
            <label>PRIMARY_HABITAT</label>
            <div id="habitat-select" class="filter-row"></div>
        </div>

        <h3>PORTRAIT_RECORDS (1-5)</h3>
        <div class="portrait-manager" id="portrait-manager"></div>
        <input type="file" id="portrait-input" class="hidden" accept=".png">
        
        <h3 style="margin-top:15px">SPRITE_DATA</h3>
        <div class="upload-grid" id="upload-zones"></div>
        <input type="file" id="single-file-input" class="hidden">
    </div>

    <div class="editor-section">
        <h3>VISUALIZER</h3>
        <div class="tabs" id="preview-tabs"></div>
        <div id="canvas-container">
            <canvas id="sprite-canvas"></canvas>
            <div id="portrait-view" class="hidden" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:2px; width:100%;"></div>
        </div>
        <div id="anim-controls" style="display:flex; justify-content: space-between; margin-top:10px; align-items: center;">
            <button class="btn" onclick="changeDir(-1)">◀</button>
            <div id="dir-label" style="font-size:0.7rem; color:var(--accent-cyan)">Down-Right</div>
            <button class="btn" onclick="changeDir(1)">▶</button>
        </div>
    </div>
</div>

<script>
    const HABITATS = ['Forest', 'Canopy', 'Cave', 'River', 'Mountain', 'Desert'];
    const ANIMS = ['Walk', 'Hop', 'Idle', 'Sleep', 'Hurt', 'Attack', 'Charge', 'Shoot', 'Strike'];
    const DIRS = ['Down-Right', 'Right', 'Up-Right', 'Up', 'Up-Left', 'Left', 'Down-Left', 'Down'];
    
    let mons = JSON.parse(localStorage.getItem('island_mons_v6') || '[]');
    let currentMonId = null;
    let activeTab = 'Portrait';
    let currentDir = 0;
    let currentTargetSlot = 0;
    
    let globalDirRow = 0;
    let globalPortraitIdx = 0;
    let gridAnims = [];
    let lastRotation = 0;
    let lastPortraitShift = 0;
    let activeHabitatFilter = null;

    const canvas = document.getElementById('sprite-canvas');
    const ctx = canvas.getContext('2d');
    let detailLoop = null;

    function init() {
        renderHabitatFilters();
        renderGrid();
        setupUploadZones();
        renderTabs();
        requestAnimationFrame(runGlobalLoop);
    }

    function getAnimData(xmlString, animName) {
        if (!xmlString) return null;
        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlString, "text/xml");
        const anims = Array.from(xml.getElementsByTagName('Anim'));
        let target = anims.find(a => a.querySelector('Name').textContent === animName);
        if (!target) return null;
        const copyOf = target.querySelector('CopyOf');
        if (copyOf) target = anims.find(a => a.querySelector('Name').textContent === copyOf.textContent);
        if (!target) return null;

        return {
            fw: parseInt(target.querySelector('FrameWidth').textContent),
            fh: parseInt(target.querySelector('FrameHeight').textContent),
            durs: Array.from(target.getElementsByTagName('Duration')).map(d => parseInt(d.textContent))
        };
    }

    // --- PORTRAIT LOGIC ---
    function renderPortraitManager() {
        const mon = mons.find(m => m.id === currentMonId);
        const container = document.getElementById('portrait-manager');
        container.innerHTML = '';
        
        for (let i = 0; i < 5; i++) {
            const slot = document.createElement('div');
            const imgData = mon.portraits[i];
            slot.className = `portrait-slot ${imgData ? 'active' : ''}`;
            slot.onclick = () => triggerSlotUpload(i);
            
            if (imgData) {
                slot.innerHTML = `<img src="${imgData}"><div class="slot-label">${i+1}/5</div>`;
            } else {
                slot.innerHTML = `<span>+</span><div class="slot-label">${i+1}/5</div>`;
            }
            container.appendChild(slot);
        }
    }

    function triggerSlotUpload(index) {
        currentTargetSlot = index;
        document.getElementById('portrait-input').click();
    }

    document.getElementById('portrait-input').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const mon = mons.find(m => m.id === currentMonId);
            mon.portraits[currentTargetSlot] = ev.target.result;
            save();
            renderPortraitManager();
            renderGrid();
        };
        reader.readAsDataURL(file);
    };

    // --- BATCH UPLOAD ENGINE ---
    async function handleBatchUpload(files) {
        const mon = mons.find(m => m.id === currentMonId);
        if (!mon) return;

        for (let file of files) {
            const name = file.name.toLowerCase();
            const reader = new FileReader();

            if (name.endsWith('.xml')) {
                mon.xmlData = await file.text();
            } else if (name.endsWith('.png')) {
                const dataUrl = await new Promise(res => {
                    reader.onload = e => res(e.target.result);
                    reader.readAsDataURL(file);
                });

                if (name.includes('portrait')) {
                    // Find first empty slot or add to end if < 5
                    let emptyIdx = mon.portraits.findIndex(p => !p);
                    if (emptyIdx === -1 && mon.portraits.length < 5) {
                        mon.portraits.push(dataUrl);
                    } else if (emptyIdx !== -1) {
                        mon.portraits[emptyIdx] = dataUrl;
                    }
                } else {
                    const matchedAnim = ANIMS.find(a => name.includes(a.toLowerCase()));
                    if (matchedAnim) mon.assets[matchedAnim + '-Anim'] = dataUrl;
                }
            }
        }
        save();
        updateUploadCheckmarks();
        renderPortraitManager();
        renderGrid();
        setPreviewTab(activeTab);
    }

    // --- REGISTRY ENGINE ---
    function renderGrid() {
        const grid = document.getElementById('mon-grid');
        const search = document.getElementById('search').value.toLowerCase();
        grid.innerHTML = ''; gridAnims = [];

        mons.filter(m => {
            const matchS = m.name.toLowerCase().includes(search);
            const matchH = !activeHabitatFilter || m.habitat === activeHabitatFilter;
            return matchS && matchH;
        }).forEach(mon => {
            const card = document.createElement('div');
            card.className = 'mon-card';
            card.onclick = () => openDetail(mon.id);
            
            // Cycle through existing portraits only
            const validPortraits = mon.portraits.filter(p => !!p);
            const currentPortrait = (validPortraits.length > 0) 
                ? validPortraits[globalPortraitIdx % validPortraits.length] 
                : '';

            card.innerHTML = `
                <img src="${currentPortrait}" style="width:48px; height:48px; object-fit:none; border:1px solid #333; image-rendering: pixelated; background:#000;">
                <div class="name">${mon.name || 'UNKNOWN'}</div>
                <div class="card-previews">
                    ${['Walk','Hop','Attack'].map(t => `
                        <div style="text-align:center">
                            <canvas id="prev-${t}-${mon.id}" class="mini-preview"></canvas>
                            <div class="prev-label">${t}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            grid.appendChild(card);

            ['Walk','Hop','Attack'].forEach(type => {
                const key = type + '-Anim';
                if (mon.assets[key] && mon.xmlData) {
                    const img = new Image(); img.src = mon.assets[key];
                    gridAnims.push({ canvas: document.getElementById(`prev-${type}-${mon.id}`), mon, type, img, frame: 0, last: 0 });
                }
            });
        });
    }

    function runGlobalLoop(now) {
        if (now - lastRotation > 1500) { globalDirRow = (globalDirRow + 1) % 8; lastRotation = now; }
        if (now - lastPortraitShift > 2000) { 
            globalPortraitIdx++; 
            lastPortraitShift = now;
            renderGrid(); 
        }

        gridAnims.forEach(a => {
            const data = getAnimData(a.mon.xmlData, a.type);
            if (!data) return;
            if (now - a.last >= data.durs[a.frame] * 16) {
                a.frame = (a.frame + 1) % data.durs.length; a.last = now;
            }
            const c = a.canvas; c.width = 46; c.height = 46;
            const cx = c.getContext('2d');
            cx.imageSmoothingEnabled = false; cx.clearRect(0,0,46,46);

            const scale = Math.min(c.width / data.fw, c.height / data.fh);
            const dw = data.fw * scale; const dh = data.fh * scale;
            const ox = (c.width - dw) / 2; const oy = (c.height - dh) / 2;

            cx.drawImage(a.img, a.frame * data.fw, globalDirRow * data.fh, data.fw, data.fh, ox, oy, dw, dh);
        });
        requestAnimationFrame(runGlobalLoop);
    }

    function openDetail(id) {
        currentMonId = id; const mon = mons.find(m => m.id === id);
        document.getElementById('grid-view').classList.add('hidden');
        document.getElementById('detail-view').style.display = 'block';
        document.getElementById('edit-name').value = mon.name;
        renderHabitatSelectors();
        renderPortraitManager();
        updateUploadCheckmarks(); setPreviewTab('Portrait'); window.scrollTo(0,0);
    }

    function showGrid() {
        cancelAnimationFrame(detailLoop);
        document.getElementById('detail-view').style.display = 'none';
        document.getElementById('grid-view').classList.remove('hidden');
        renderGrid();
    }

    function setPreviewTab(tab) {
        activeTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.name === tab));
        const pv = document.getElementById('portrait-view');
        const ac = document.getElementById('anim-controls');

        if (tab === 'Portrait') {
            canvas.classList.add('hidden'); pv.classList.remove('hidden'); ac.classList.add('hidden');
            renderPortraitGrid();
        } else {
            canvas.classList.remove('hidden'); pv.classList.add('hidden'); ac.classList.remove('hidden');
            startDetailAnim();
        }
    }

    function startDetailAnim() {
        const mon = mons.find(m => m.id === currentMonId);
        cancelAnimationFrame(detailLoop);
        const data = getAnimData(mon.xmlData, activeTab);
        if (!data || !mon.assets[activeTab + '-Anim']) {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            return;
        }

        const img = new Image(); img.src = mon.assets[activeTab + '-Anim'];
        img.onload = () => {
            canvas.width = 160; canvas.height = 160;
            let frame = 0; let last = performance.now();
            function loop(now) {
                if (now - last >= data.durs[frame] * 16) { frame = (frame + 1) % data.durs.length; last = now; }
                ctx.imageSmoothingEnabled = false; ctx.clearRect(0,0,160,160);
                const scale = Math.min(160 / data.fw, 160 / data.fh);
                const dw = data.fw * scale; const dh = data.fh * scale;
                ctx.drawImage(img, frame * data.fw, currentDir * data.fh, data.fw, data.fh, (160-dw)/2, (160-dh)/2, dw, dh);
                detailLoop = requestAnimationFrame(loop);
            }
            detailLoop = requestAnimationFrame(loop);
        };
    }

    function renderPortraitGrid() {
        const mon = mons.find(m => m.id === currentMonId);
        const view = document.getElementById('portrait-view'); view.innerHTML = '';
        // Show the 4x4 grid for the first available portrait
        const pSource = mon.portraits.find(p => !!p);
        if (!pSource) return;
        for (let i = 0; i < 16; i++) {
            const f = document.createElement('div');
            f.style.aspectRatio = '1/1'; f.style.background = `url(${pSource})`;
            f.style.backgroundSize = '400% 400%'; f.style.imageRendering = 'pixelated';
            f.style.backgroundPosition = `${(i % 4) * 33.3}% ${Math.floor(i / 4) * 33.3}%`;
            f.style.border = '1px solid #222'; view.appendChild(f);
        }
    }

    function setupUploadZones() {
        const zones = [...ANIMS.map(a => a + '-Anim'), 'AnimData.xml'];
        document.getElementById('upload-zones').innerHTML = zones.map(z => `
            <div class="upload-zone" id="z-${z}" onclick="triggerSingleUpload('${z}')">
                <span>${z.replace('-Anim','')}</span><span class="chk"></span>
            </div>
        `).join('');
    }

    function triggerSingleUpload(key) {
        const input = document.getElementById('single-file-input');
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const r = new FileReader();
            r.onload = (ev) => {
                const mon = mons.find(m => m.id === currentMonId);
                if (key === 'AnimData.xml') mon.xmlData = ev.target.result;
                else mon.assets[key] = ev.target.result;
                save(); updateUploadCheckmarks(); setPreviewTab(activeTab);
            };
            key === 'AnimData.xml' ? r.readAsText(file) : r.readAsDataURL(file);
        };
        input.click();
    }

    function updateUploadCheckmarks() {
        const mon = mons.find(m => m.id === currentMonId);
        if (!mon) return;
        document.querySelectorAll('.upload-zone').forEach(z => {
            const key = z.id.replace('z-', '');
            const has = (key === 'AnimData.xml') ? !!mon.xmlData : !!mon.assets[key];
            z.classList.toggle('loaded', has); z.querySelector('.chk').innerText = has ? '✓' : '';
        });
    }

    function addNewMon() {
        const id = Date.now().toString();
        // Initialize with 5 empty portrait slots
        mons.push({ id, name: 'NEW_ENTITY', habitat: null, portraits: [null, null, null, null, null], assets: {}, xmlData: null });
        save(); openDetail(id);
    }

    function save() { localStorage.setItem('island_mons_v6', JSON.stringify(mons)); }
    function updateCurrentMon(k, v) { const idx = mons.findIndex(m => m.id === currentMonId); mons[idx][k] = v; save(); }
    function changeDir(d) { currentDir = (currentDir + d + 8) % 8; document.getElementById('dir-label').innerText = DIRS[currentDir]; }
    function deleteCurrentMon() { if(confirm('ERASE RECORD?')) { mons = mons.filter(m => m.id !== currentMonId); save(); showGrid(); } }

    function renderHabitatFilters() {
        document.getElementById('habitat-filters').innerHTML = HABITATS.map(h => `
            <div class="filter-chip ${activeHabitatFilter === h ? 'active' : ''}" onclick="toggleHFilter('${h}')">${h}</div>
        `).join('');
    }
    function toggleHFilter(h) {
        activeHabitatFilter = (activeHabitatFilter === h) ? null : h;
        renderHabitatFilters(); renderGrid();
    }

    function renderHabitatSelectors() {
        const mon = mons.find(m => m.id === currentMonId);
        document.getElementById('habitat-select').innerHTML = HABITATS.map(h => `
            <div class="filter-chip ${mon.habitat === h ? 'active' : ''}" onclick="setHabitat('${h}')">${h}</div>
        `).join('');
    }
    function setHabitat(h) { updateCurrentMon('habitat', h); renderHabitatSelectors(); }

    function renderTabs() {
        document.getElementById('preview-tabs').innerHTML = ['Portrait', ...ANIMS].map(t => `
            <div class="tab" data-name="${t}" onclick="setPreviewTab('${t}')">${t}</div>
        `).join('');
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(mons, null, 2)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'island_registry.json'; a.click();
    }

    init();
</script>
</body>
</html>

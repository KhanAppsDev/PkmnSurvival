<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rogue Demo</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="gameContainer">

<canvas id="gameCanvas" width="320" height="320"></canvas>

<div id="dialogueBox">Press A B X Y Start or Select</div>

<div id="controls">

<div id="joystickBase">
<div id="joystickStick"></div>
</div>

<div class="buttons">

<button id="btnY">Y</button>
<button id="btnX">X</button>
<button id="btnB">B</button>
<button id="btnA">A</button>

<button id="btnSelect" class="wide">SELECT</button>
<button id="btnStart" class="wide">START</button>

</div>

</div>

</div>

<script src="game.js"></script>

</body>
</html>

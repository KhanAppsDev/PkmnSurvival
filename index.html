<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Island Mon Registry — Field Research Terminal</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   ISLAND MON REGISTRY — Field Research Terminal v1.0.0
   Dark, moody aesthetic — monospace, cyan/green accents, scanlines
   ═══════════════════════════════════════════════════════════════ */

@import url(‘https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap’);

:root {
–bg-deep: #0a0d0f;
–bg-panel: #0f1317;
–bg-card: #141a1f;
–bg-input: #0c1015;
–bg-hover: #1a2229;
–border: #1e2a32;
–border-focus: #2a8a6e;
–text-primary: #c8d6df;
–text-secondary: #6b7f8e;
–text-dim: #3a4a55;
–cyan: #00e5c8;
–cyan-dim: #00e5c840;
–cyan-glow: #00e5c820;
–green: #39ff7f;
–green-dim: #39ff7f40;
–red: #ff4a6a;
–red-dim: #ff4a6a30;
–amber: #ffb347;
–amber-dim: #ffb34730;
–purple: #b48eff;
–font-mono: ‘IBM Plex Mono’, ‘Share Tech Mono’, ‘Courier New’, monospace;
–font-display: ‘Share Tech Mono’, monospace;
–scanline-opacity: 0.03;
–radius: 4px;
–toast-success: #39ff7f;
–toast-error: #ff4a6a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
height: 100%;
overflow: hidden;
background: var(–bg-deep);
color: var(–text-primary);
font-family: var(–font-mono);
font-size: 13px;
line-height: 1.5;
}

/* ── Scanline overlay ── */
body::after {
content: ‘’;
position: fixed;
inset: 0;
pointer-events: none;
z-index: 9999;
background: repeating-linear-gradient(
0deg,
transparent,
transparent 2px,
rgba(0, 229, 200, var(–scanline-opacity)) 2px,
rgba(0, 229, 200, var(–scanline-opacity)) 4px
);
}

/* ── CRT flicker ── */
@keyframes flicker {
0%, 100% { opacity: 1; }
92% { opacity: 1; }
93% { opacity: 0.8; }
94% { opacity: 1; }
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(–bg-deep); }
::-webkit-scrollbar-thumb { background: var(–border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(–text-dim); }

/* ── Layout ── */
#app {
display: flex;
flex-direction: column;
height: 100vh;
animation: flicker 8s infinite;
}

header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 10px 20px;
background: var(–bg-panel);
border-bottom: 1px solid var(–border);
flex-shrink: 0;
position: relative;
}

header::before {
content: ‘’;
position: absolute;
bottom: 0;
left: 0;
right: 0;
height: 1px;
background: linear-gradient(90deg, transparent, var(–cyan-dim), transparent);
}

.logo {
font-family: var(–font-display);
font-size: 16px;
color: var(–cyan);
letter-spacing: 2px;
text-transform: uppercase;
display: flex;
align-items: center;
gap: 10px;
}

.logo-icon {
width: 28px;
height: 28px;
border: 2px solid var(–cyan);
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 14px;
color: var(–cyan);
position: relative;
}

.logo-icon::after {
content: ‘’;
position: absolute;
inset: -4px;
border: 1px solid var(–cyan-dim);
border-radius: 50%;
}

.header-actions {
display: flex;
gap: 8px;
align-items: center;
}

.btn {
font-family: var(–font-mono);
font-size: 11px;
padding: 6px 14px;
border: 1px solid var(–border);
background: var(–bg-card);
color: var(–text-secondary);
cursor: pointer;
border-radius: var(–radius);
transition: all 0.15s ease;
letter-spacing: 0.5px;
text-transform: uppercase;
}

.btn:hover {
border-color: var(–cyan);
color: var(–cyan);
background: var(–cyan-glow);
}

.btn-primary {
border-color: var(–cyan);
color: var(–cyan);
background: var(–cyan-glow);
}

.btn-primary:hover {
background: var(–cyan-dim);
box-shadow: 0 0 12px var(–cyan-glow);
}

.btn-danger {
border-color: var(–red);
color: var(–red);
}

.btn-danger:hover {
background: var(–red-dim);
}

/* ── Main columns ── */
.main-content {
display: flex;
flex: 1;
overflow: hidden;
}

/* ── Left Sidebar ── */
.sidebar {
width: 280px;
min-width: 280px;
background: var(–bg-panel);
border-right: 1px solid var(–border);
display: flex;
flex-direction: column;
overflow: hidden;
}

.sidebar-header {
padding: 12px 14px;
border-bottom: 1px solid var(–border);
}

.search-box {
position: relative;
}

.search-box input {
width: 100%;
padding: 8px 10px 8px 30px;
background: var(–bg-input);
border: 1px solid var(–border);
color: var(–text-primary);
font-family: var(–font-mono);
font-size: 12px;
border-radius: var(–radius);
outline: none;
transition: border-color 0.15s;
}

.search-box input:focus {
border-color: var(–cyan);
}

.search-box input::placeholder {
color: var(–text-dim);
}

.search-box::before {
content: ‘⌕’;
position: absolute;
left: 10px;
top: 50%;
transform: translateY(-50%);
color: var(–text-dim);
font-size: 13px;
}

.filter-row {
display: flex;
gap: 6px;
margin-top: 8px;
flex-wrap: wrap;
}

.filter-chip {
font-family: var(–font-mono);
font-size: 10px;
padding: 3px 8px;
border: 1px solid var(–border);
background: transparent;
color: var(–text-dim);
cursor: pointer;
border-radius: 2px;
transition: all 0.15s;
text-transform: uppercase;
letter-spacing: 0.5px;
}

.filter-chip:hover, .filter-chip.active {
border-color: var(–cyan);
color: var(–cyan);
background: var(–cyan-glow);
}

.mon-list {
flex: 1;
overflow-y: auto;
padding: 6px;
}

.mon-item {
display: flex;
align-items: center;
gap: 10px;
padding: 10px 12px;
cursor: pointer;
border-radius: var(–radius);
transition: all 0.12s;
border: 1px solid transparent;
margin-bottom: 2px;
}

.mon-item:hover {
background: var(–bg-hover);
border-color: var(–border);
}

.mon-item.selected {
background: var(–bg-card);
border-color: var(–cyan);
box-shadow: inset 3px 0 0 var(–cyan);
}

.mon-dot {
width: 8px;
height: 8px;
border-radius: 50%;
flex-shrink: 0;
background: var(–text-dim);
transition: all 0.2s;
}

.mon-dot.complete {
background: var(–green);
box-shadow: 0 0 6px var(–green-dim);
}

.mon-dot.partial {
background: var(–amber);
box-shadow: 0 0 6px var(–amber-dim);
}

.mon-name {
font-size: 12px;
color: var(–text-primary);
flex: 1;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.mon-biome-tags {
display: flex;
gap: 3px;
}

.biome-dot {
width: 5px;
height: 5px;
border-radius: 50%;
opacity: 0.6;
}

.sidebar-footer {
padding: 10px 14px;
border-top: 1px solid var(–border);
}

.sidebar-footer .btn {
width: 100%;
text-align: center;
}

.mon-count {
font-size: 10px;
color: var(–text-dim);
text-align: center;
padding: 4px 0 0;
letter-spacing: 1px;
}

/* ── Right Panel ── */
.editor-panel {
flex: 1;
overflow-y: auto;
padding: 20px 28px;
background: var(–bg-deep);
}

.empty-state {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
height: 100%;
color: var(–text-dim);
gap: 16px;
}

.empty-state-icon {
font-size: 48px;
opacity: 0.3;
}

.empty-state p {
font-size: 13px;
letter-spacing: 1px;
}

/* ── Section blocks ── */
.section {
margin-bottom: 24px;
background: var(–bg-panel);
border: 1px solid var(–border);
border-radius: var(–radius);
overflow: hidden;
}

.section-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 10px 16px;
background: var(–bg-card);
border-bottom: 1px solid var(–border);
font-size: 11px;
text-transform: uppercase;
letter-spacing: 1.5px;
color: var(–cyan);
}

.section-body {
padding: 16px;
}

/* ── Form fields ── */
.field-group {
margin-bottom: 14px;
}

.field-group:last-child {
margin-bottom: 0;
}

.field-label {
display: block;
font-size: 10px;
text-transform: uppercase;
letter-spacing: 1px;
color: var(–text-secondary);
margin-bottom: 6px;
}

.field-input {
width: 100%;
padding: 8px 12px;
background: var(–bg-input);
border: 1px solid var(–border);
color: var(–text-primary);
font-family: var(–font-mono);
font-size: 12px;
border-radius: var(–radius);
outline: none;
transition: border-color 0.15s;
}

.field-input:focus {
border-color: var(–cyan);
}

textarea.field-input {
resize: vertical;
min-height: 80px;
}

/* ── Behavior selector ── */
.behavior-options {
display: flex;
gap: 8px;
}

.behavior-btn {
flex: 1;
padding: 10px 8px;
background: var(–bg-input);
border: 1px solid var(–border);
color: var(–text-secondary);
font-family: var(–font-mono);
font-size: 11px;
cursor: pointer;
border-radius: var(–radius);
transition: all 0.15s;
text-align: center;
}

.behavior-btn:hover {
border-color: var(–text-dim);
}

.behavior-btn.selected {
border-color: var(–cyan);
color: var(–cyan);
background: var(–cyan-glow);
}

.behavior-btn .beh-icon {
display: block;
font-size: 18px;
margin-bottom: 4px;
}

.behavior-btn .beh-label {
display: block;
font-size: 10px;
text-transform: uppercase;
letter-spacing: 0.5px;
}

.behavior-btn .beh-desc {
display: block;
font-size: 9px;
color: var(–text-dim);
margin-top: 3px;
}

/* ── Biome checkboxes ── */
.biome-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
gap: 8px;
}

.biome-check {
display: flex;
align-items: center;
gap: 8px;
padding: 8px 10px;
background: var(–bg-input);
border: 1px solid var(–border);
border-radius: var(–radius);
cursor: pointer;
transition: all 0.15s;
}

.biome-check:hover {
border-color: var(–text-dim);
}

.biome-check.checked {
border-color: var(–green);
background: rgba(57, 255, 127, 0.05);
}

.biome-check input { display: none; }

.biome-indicator {
width: 14px;
height: 14px;
border: 1px solid var(–border);
border-radius: 2px;
display: flex;
align-items: center;
justify-content: center;
font-size: 10px;
color: transparent;
transition: all 0.15s;
flex-shrink: 0;
}

.biome-check.checked .biome-indicator {
border-color: var(–green);
color: var(–green);
background: rgba(57, 255, 127, 0.1);
}

.biome-label-text {
font-size: 11px;
color: var(–text-secondary);
}

.biome-check.checked .biome-label-text {
color: var(–text-primary);
}

.biome-color {
width: 8px;
height: 8px;
border-radius: 50%;
flex-shrink: 0;
}

/* ── Moves list ── */
.moves-list {
display: flex;
flex-direction: column;
gap: 6px;
}

.move-row {
display: flex;
gap: 8px;
align-items: center;
}

.move-row input {
flex: 1;
}

.move-num {
font-size: 10px;
color: var(–text-dim);
width: 20px;
text-align: right;
flex-shrink: 0;
}

.btn-icon {
width: 28px;
height: 28px;
display: flex;
align-items: center;
justify-content: center;
border: 1px solid var(–border);
background: var(–bg-input);
color: var(–text-dim);
cursor: pointer;
border-radius: var(–radius);
font-size: 14px;
transition: all 0.15s;
flex-shrink: 0;
}

.btn-icon:hover {
border-color: var(–red);
color: var(–red);
}

.btn-icon.add:hover {
border-color: var(–green);
color: var(–green);
}

/* ── Sprite upload grid ── */
.sprite-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
gap: 10px;
}

.sprite-slot {
background: var(–bg-input);
border: 1px dashed var(–border);
border-radius: var(–radius);
padding: 12px;
text-align: center;
cursor: pointer;
transition: all 0.15s;
position: relative;
min-height: 80px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 6px;
}

.sprite-slot:hover {
border-color: var(–cyan);
background: var(–cyan-glow);
}

.sprite-slot.uploaded {
border-style: solid;
border-color: var(–green);
background: rgba(57, 255, 127, 0.03);
}

.sprite-slot.uploading {
border-color: var(–amber);
opacity: 0.7;
}

.sprite-slot.error {
border-color: var(–red);
}

.sprite-filename {
font-size: 10px;
color: var(–text-secondary);
letter-spacing: 0.5px;
}

.sprite-status {
font-size: 14px;
}

.sprite-slot input[type=“file”] {
display: none;
}

.sprite-progress {
position: absolute;
bottom: 0;
left: 0;
height: 2px;
background: var(–cyan);
border-radius: 0 0 var(–radius) var(–radius);
transition: width 0.3s;
}

/* ── Animation Preview ── */
.preview-container {
display: flex;
flex-direction: column;
align-items: center;
gap: 12px;
}

.preview-canvas-wrap {
position: relative;
border: 1px solid var(–border);
border-radius: var(–radius);
overflow: hidden;
}

/* checkerboard background */
.preview-canvas-wrap canvas {
display: block;
image-rendering: pixelated;
}

.preview-controls {
display: flex;
align-items: center;
gap: 12px;
}

.dir-btn {
width: 32px;
height: 32px;
display: flex;
align-items: center;
justify-content: center;
border: 1px solid var(–border);
background: var(–bg-card);
color: var(–text-secondary);
cursor: pointer;
border-radius: var(–radius);
font-size: 14px;
transition: all 0.15s;
}

.dir-btn:hover {
border-color: var(–cyan);
color: var(–cyan);
}

.dir-label {
font-size: 11px;
color: var(–text-secondary);
min-width: 80px;
text-align: center;
text-transform: uppercase;
letter-spacing: 1px;
}

.anim-select {
background: var(–bg-input);
border: 1px solid var(–border);
color: var(–text-primary);
font-family: var(–font-mono);
font-size: 11px;
padding: 4px 8px;
border-radius: var(–radius);
outline: none;
}

.anim-select:focus {
border-color: var(–cyan);
}

/* ── Portrait Preview ── */
.portrait-grid {
display: flex;
gap: 8px;
flex-wrap: wrap;
justify-content: center;
}

.portrait-frame {
border: 1px solid var(–border);
border-radius: 2px;
image-rendering: pixelated;
}

/* ── Settings Modal ── */
.modal-overlay {
position: fixed;
inset: 0;
background: rgba(0, 0, 0, 0.75);
display: flex;
align-items: center;
justify-content: center;
z-index: 1000;
backdrop-filter: blur(4px);
}

.modal-overlay.hidden { display: none; }

.modal {
background: var(–bg-panel);
border: 1px solid var(–border);
border-radius: var(–radius);
width: 460px;
max-width: 90vw;
box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 1px var(–cyan-dim);
}

.modal-header {
padding: 16px 20px;
border-bottom: 1px solid var(–border);
font-size: 13px;
text-transform: uppercase;
letter-spacing: 1.5px;
color: var(–cyan);
}

.modal-body {
padding: 20px;
}

.modal-footer {
padding: 12px 20px;
border-top: 1px solid var(–border);
display: flex;
justify-content: flex-end;
gap: 8px;
}

/* ── Toast notifications ── */
.toast-container {
position: fixed;
bottom: 20px;
right: 20px;
z-index: 2000;
display: flex;
flex-direction: column;
gap: 8px;
pointer-events: none;
}

.toast {
padding: 10px 16px;
background: var(–bg-card);
border: 1px solid var(–border);
border-radius: var(–radius);
font-size: 11px;
color: var(–text-primary);
box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
animation: toastIn 0.3s ease;
pointer-events: auto;
max-width: 360px;
}

.toast.success { border-color: var(–green); }
.toast.error { border-color: var(–red); }
.toast.info { border-color: var(–cyan); }

.toast-icon {
margin-right: 8px;
}

@keyframes toastIn {
from { opacity: 0; transform: translateY(10px); }
to { opacity: 1; transform: translateY(0); }
}

@keyframes toastOut {
from { opacity: 1; transform: translateY(0); }
to { opacity: 0; transform: translateY(-10px); }
}

/* ── Delete confirm ── */
.delete-zone {
margin-top: 20px;
padding-top: 16px;
border-top: 1px solid var(–border);
display: flex;
justify-content: flex-end;
}

/* ── Version footer ── */
footer {
padding: 4px 20px;
background: var(–bg-panel);
border-top: 1px solid var(–border);
font-size: 9px;
color: var(–text-dim);
letter-spacing: 1px;
text-align: right;
flex-shrink: 0;
}

/* ── Responsive ── */
@media (max-width: 900px) {
.sidebar { width: 220px; min-width: 220px; }
.editor-panel { padding: 16px; }
.sprite-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
}

@media (max-width: 600px) {
.main-content { flex-direction: column; }
.sidebar { width: 100%; min-width: 100%; max-height: 40vh; border-right: none; border-bottom: 1px solid var(–border); }
.editor-panel { padding: 12px; }
.behavior-options { flex-direction: column; }
.biome-grid { grid-template-columns: 1fr 1fr; }
}

/* ── Token masked display ── */
.token-display {
font-size: 11px;
color: var(–text-dim);
margin-top: 4px;
}
</style>

</head>

<script>
/* ═══════════════════════════════════════════════════════════════

// ── Constants ──
const SPRITE_FILES = [

  { id: 'docile', label: 'Docile', icon: '♥', desc: 'Walk up & pet to recruit' },

  { id: 'aggressive', label: 'Aggressive', icon: '⚔', desc: 'Must weaken in combat' }

  'South', 'South-East', 'East', 'North-East',
  'North', 'North-West', 'West', 'South-West'

const STORAGE_KEY = 'islandMonRegistry';
const GH_SETTINGS_KEY = 'islandMonGH';

// ── State ──
let mons = [];
let selectedMonId = null;
let currentFilter = 'all';
let animationState = null; // { frameTimer, direction, animType }

// ── Persistence ──
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) mons = JSON.parse(raw);
  } catch(e) { mons = []; }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(mons));
}

function loadGHSettings() {
  try {
    return JSON.parse(localStorage.getItem(GH_SETTINGS_KEY)) || {};
  } catch(e) { return {}; }
}

function saveGHSettings(s) {
  localStorage.setItem(GH_SETTINGS_KEY, JSON.stringify(s));
}

// ── Toast ──
function toast(msg, type = 'info') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  const icons = { success: '✓', error: '✗', info: 'ℹ' };
  t.innerHTML = '<span class="toast-icon">' + (icons[type]||'') + '</span>' + escapeHTML(msg);
  c.appendChild(t);
  setTimeout(() => {
    t.style.animation = 'toastOut 0.3s ease forwards';
    setTimeout(() => t.remove(), 300);
  }, 3500);
}

function escapeHTML(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Mon helpers ──
function generateId() {
  return 'mon_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
}

function folderName(name) {
  return name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9\-]/g, '');
}

function isComplete(mon) {
  if (!mon.name || !mon.behavior || !mon.biomes.length || !mon.moves.length) return false;
  return SPRITE_FILES.every(f => mon.sprites && mon.sprites[f]);
}

function isPartial(mon) {
  if (!mon.name) return false;
  const hasSprites = SPRITE_FILES.some(f => mon.sprites && mon.sprites[f]);
  return mon.behavior || mon.biomes.length || mon.moves.length || hasSprites;
}

function completionStatus(mon) {
  if (isComplete(mon)) return 'complete';
  if (isPartial(mon)) return 'partial';
  return 'empty';
}

// ── Filter & Search ──
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderMonList();
}

function getFilteredMons() {
  let list = mons;
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (q) list = list.filter(m => m.name.toLowerCase().includes(q));
  if (currentFilter === 'complete') list = list.filter(m => isComplete(m));
  if (currentFilter === 'incomplete') list = list.filter(m => !isComplete(m));
  return list;
}

// ── Render Mon List ──
function renderMonList() {
  const list = getFilteredMons();
  const container = document.getElementById('monList');
  container.innerHTML = list.map(m => {
    const status = completionStatus(m);
    const sel = m.id === selectedMonId ? 'selected' : '';
    const biomeDots = m.biomes.map(b => {
      const biome = BIOMES.find(x => x.id === b);
      return biome ? '<span class="biome-dot" style="background:' + biome.color + '"></span>' : '';
    }).join('');
    return '<div class="mon-item ' + sel + '" onclick="selectMon(\'' + m.id + '\')">' +
      '<span class="mon-dot ' + status + '"></span>' +
      '<span class="mon-name">' + escapeHTML(m.name || 'Unnamed') + '</span>' +
      '<span class="mon-biome-tags">' + biomeDots + '</span>' +
    '</div>';
  }).join('');

  const total = mons.length;
  const complete = mons.filter(isComplete).length;
  document.getElementById('monCount').textContent = total + ' registered · ' + complete + ' complete';
}

// ── Add Mon ──
function addMon() {
  const mon = {
    id: generateId(),
    name: '',
    behavior: '',
    biomes: [],
    moves: [''],
    notes: '',
    sprites: {}
  };
  mons.push(mon);
  saveData();
  selectedMonId = mon.id;
  renderMonList();
  renderEditor();
  // Focus the name input
  setTimeout(() => {
    const nameInput = document.getElementById('monNameInput');
    if (nameInput) nameInput.focus();
  }, 50);
}

// ── Select Mon ──
function selectMon(id) {
  stopAnimation();
  selectedMonId = id;
  renderMonList();
  renderEditor();
}

// ── Delete Mon ──
function deleteMon(id) {
  if (!confirm('Delete this mon permanently?')) return;
  mons = mons.filter(m => m.id !== id);
  saveData();
  if (selectedMonId === id) {
    selectedMonId = null;
    renderEditor();
  }
  renderMonList();
  toast('Mon deleted', 'info');
}

// ── Render Editor ──
function renderEditor() {
  const empty = document.getElementById('emptyState');
  const content = document.getElementById('editorContent');
  const mon = mons.find(m => m.id === selectedMonId);

  if (!mon) {
    empty.style.display = 'flex';
    content.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  content.style.display = 'block';

  content.innerHTML = buildEditorHTML(mon);
  // Rebind biome checkboxes visual state
  document.querySelectorAll('.biome-check').forEach(el => {
    if (mon.biomes.includes(el.dataset.biome)) el.classList.add('checked');
  });
}

// ── Field updates ──
function updateField(field, value) {
const mon = mons.find(m => m.id === selectedMonId);
if (!mon) return;
mon[field] = value;
saveData();
if (field === ‘name’ || field === ‘behavior’) renderMonList();
if (field === ‘behavior’) renderEditor();
}

function toggleBiome(biomeId, el) {
const mon = mons.find(m => m.id === selectedMonId);
if (!mon) return;
const idx = mon.biomes.indexOf(biomeId);
if (idx >= 0) {
mon.biomes.splice(idx, 1);
el.classList.remove(‘checked’);
} else {
mon.biomes.push(biomeId);
el.classList.add(‘checked’);
}
saveData();
renderMonList();
}

function addMove() {
const mon = mons.find(m => m.id === selectedMonId);
if (!mon) return;
mon.moves.push(’’);
saveData();
renderEditor();
}

function removeMove(idx) {
const mon = mons.find(m => m.id === selectedMonId);
if (!mon) return;
mon.moves.splice(idx, 1);
if (mon.moves.length === 0) mon.moves.push(’’);
saveData();
renderEditor();
}

function updateMove(idx, val) {
const mon = mons.find(m => m.id === selectedMonId);
if (!mon) return;
mon.moves[idx] = val;
saveData();
}

function fileToBase64(file) {
return new Promise((resolve, reject) => {
const r = new FileReader();
r.onload = () => resolve(r.result.split(’,’)[1]);
r.onerror = () => reject(new Error(‘File read error’));
r.readAsDataURL(file);
});
}

}

function closeSettings() {
document.getElementById(‘settingsModal’).classList.add(‘hidden’);
}

function saveSettings() {
const s = {
token: document.getElementById(‘ghToken’).value.trim(),
user: document.getElementById(‘ghUser’).value.trim(),
repo: document.getElementById(‘ghRepo’).value.trim(),
branch: document.getElementById(‘ghBranch’).value.trim() || ‘main’
};
saveGHSettings(s);
closeSettings();
toast(‘GitHub settings saved’, ‘success’);
}

function updateTokenPreview(token) {
const el = document.getElementById(‘tokenPreview’);
if (!el) return;
if (token && token.length > 8) {
el.textContent = ’Stored: ’ + token.substring(0, 4) + ‘····’ + token.substring(token.length - 4);
} else {
el.textContent = ‘’;
}
}

// ── Export ──
function exportJSON() {
const exportData = mons.map(m => ({
name: m.name,
behavior: m.behavior,
biomes: m.biomes,
moves: m.moves.filter(mv => mv.trim()),
notes: m.notes,
spriteFolder: m.name ? ‘resources/pokemon/’ + folderName(m.name) + ‘/sprites/’ : null,
assets: Object.fromEntries(SPRITE_FILES.map(f => [f, !!(m.sprites && m.sprites[f])]))
}));

const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: ‘application/json’ });
const url = URL.createObjectURL(blob);
const a = document.createElement(‘a’);
a.href = url;
a.download = ‘mons.json’;
a.click();
URL.revokeObjectURL(url);
toast(‘Exported mons.json (’ + exportData.length + ’ mons)’, ‘success’);
}

// ── On first load, check if settings exist ──
function checkFirstRun() {
const gh = loadGHSettings();
if (!gh.token && !gh.user) {
openSettings();
}
}

// ── Init ──
function init() {
loadData();
renderMonList();
renderEditor();
checkFirstRun();

// Observe editor for canvas insertion
const editorContent = document.getElementById(‘editorContent’);
if (editorContent) {
editorObserver.observe(editorContent, { childList: true, subtree: true });
}

// Token preview live update
document.getElementById(‘ghToken’).addEventListener(‘input’, function() {
updateTokenPreview(this.value);
});
}

init();
</script>

</body>
</html>

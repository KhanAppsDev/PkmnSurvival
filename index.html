<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Island Mon Registry v12.1 - Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0b; --surface: #141417; --accent-cyan: #00f2ff;
            --accent-green: #39ff14; --accent-amber: #ffb100; --accent-red: #ff3e3e;
            --text: #e0e0e0; --border: #2a2a2e;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; margin: 0; padding: 0; width: 100vw; overflow-x: hidden; }
        
        /* CRT Overlay Effect */
        body::before { 
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.03)); 
            z-index: 9999; background-size: 100% 3px, 2px 100%; pointer-events: none; 
        }

        header { padding: 10px 15px; border-bottom: 1px solid var(--accent-cyan); background: var(--surface); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: transparent; border: 1px solid var(--accent-cyan); color: var(--accent-cyan); padding: 6px 12px; cursor: pointer; font-family: inherit; font-size: 0.75rem; text-transform: uppercase; }
        
        #grid-view, #island-view, #cloud-view, #detail-view { padding: 15px; }
        .hidden { display: none !important; }

        /* Search & Filters */
        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .search-bar { background: #000; border: 1px solid var(--border); color: var(--accent-green); padding: 12px; width: 100%; font-family: inherit; font-size: 1rem; }
        .filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; }
        .filter-chip { padding: 5px 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 0.7rem; white-space: nowrap; cursor: pointer;}
        .filter-chip.active { border-color: var(--accent-cyan); background: rgba(0, 242, 255, 0.2); color: var(--accent-cyan); }

        /* Grid Cards */
        .mon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .mon-card { background: var(--surface); border: 1px solid var(--border); padding: 12px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; }
        .mon-card:hover { border-color: var(--accent-cyan); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
        .mon-card .name { font-size: 0.8rem; color: var(--accent-cyan); margin-top: 8px; text-align: center; }

        /* Editor Sections */
        .editor-section { background: var(--surface); padding: 15px; border: 1px solid var(--border); margin-bottom: 15px; }
        h3 { margin: 0 0 12px 0; font-size: 0.75rem; color: var(--accent-cyan); border-bottom: 1px solid var(--border); text-transform: uppercase; }
        input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; font-family: inherit; margin-bottom: 10px; }

        /* Portraits & Sprites */
        .portrait-manager { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .portrait-slot { aspect-ratio: 1/1; background: #000; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .portrait-slot img { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }
        .portrait-slot canvas { width: 100%; height: 100%; image-rendering: pixelated; }
        @keyframes slideshow { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        .upload-zone { background: #000; border: 1px dashed var(--border); padding: 10px; font-size: 0.65rem; margin-bottom: 5px; cursor: pointer; display: flex; justify-content: space-between; }
        .upload-zone.loaded { border-color: var(--accent-green); color: var(--accent-green); }

        /* Canvas Areas */
        #canvas-container { background: #000; border: 1px solid var(--border); display: flex; justify-content: center; align-items: center; min-height: 200px; position: relative; }
        canvas { image-rendering: pixelated; max-width: 100%; }

        footer { padding: 10px; text-align: center; font-size: 0.65rem; color: #666; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<header>
    <div style="color: var(--accent-cyan); font-weight: bold; letter-spacing: 1px;">REGISTRY_OS_V12</div>
    <div style="display: flex; gap: 8px;">
        <button class="btn" onclick="showView('cloud')" style="border-color: var(--accent-cyan);">Cloud</button>
        <button class="btn" onclick="showView('island')" style="border-color: var(--accent-amber);">Island</button>
        <button class="btn" onclick="addNewMon()" style="border-color: var(--accent-green);">+ Add</button>
    </div>
</header>

<div id="cloud-view" class="hidden">
    <div class="editor-section">
        <h3>CLOUD_SYNC_PROTOCOL</h3>
        <p style="font-size: 0.7rem; color: #888; margin-bottom: 15px;">Input a Registry Code to sync with the Firebase global database.</p>
        <input type="text" id="cloud-code-input" placeholder="ENTER_CODE (e.g. ALPHA_7)">
        <div style="display: flex; gap: 10px; margin-top: 5px;">
            <button class="btn" onclick="loadFromCloud()" style="flex:1">LOAD_DATA</button>
            <button class="btn" onclick="saveToCloud()" style="flex:1; border-color: var(--accent-green); color: var(--accent-green);">PUBLISH_CODE</button>
        </div>
        <div id="cloud-status" style="margin-top: 15px; font-size: 0.7rem; color: var(--accent-amber);">SYSTEM_READY</div>
    </div>
</div>

<div id="grid-view">
    <div class="controls">
        <input type="text" id="search" class="search-bar" placeholder="SEARCH_BY_NAME..." oninput="renderGrid()">
        <div id="habitat-filters" class="filter-row"></div>
    </div>
    <div class="mon-grid" id="mon-grid"></div>
</div>

<div id="island-view" class="hidden">
    <div style="width: 100%; display: flex; justify-content: space-between; margin-bottom: 15px;">
        <button class="btn" onclick="showView('grid')">&lt; REGISTRY</button>
        <div style="display: flex; gap: 5px;">
            <input type="number" id="map-seed" value="12345" style="width: 80px; margin:0;">
            <button class="btn" onclick="initIslandGen()" style="border-color: var(--accent-green);">REGENERATE</button>
        </div>
    </div>
    <div style="position: relative; border: 2px solid var(--border); background: #000; width: 300px; height: 300px; margin: 0 auto;">
        <canvas id="island-canvas" width="300" height="300" style="cursor: crosshair;"></canvas>
    </div>
    <div id="tile-panel" class="editor-section hidden" style="width: 100%; margin-top: 20px;">
        <h3 id="tile-terrain-label">TERRAIN_ANALYSIS</h3>
        <canvas id="tile-detail-canvas" width="200" height="200" style="background: #000; border: 1px solid var(--border); display: block; margin: 0 auto;"></canvas>
        <div id="tile-mon-list" style="margin-top: 10px; font-size: 0.75rem; color: var(--accent-cyan); text-align: center;"></div>
    </div>
</div>

<div id="detail-view" class="hidden">
    <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
        <button class="btn" onclick="showView('grid')">&lt; EXIT</button>
        <button class="btn" onclick="deleteCurrentMon()" style="border-color: var(--accent-red); color: var(--accent-red);">DELETE_RECORD</button>
    </div>
    <div class="editor-section">
        <h3>NAME_REGISTRY</h3>
        <input type="text" id="edit-name" onchange="updateCurrentMon('name', this.value)">
        <h3>HABITAT_ASSIGNMENT</h3>
        <div id="habitat-select" class="filter-row"></div>
        
        <h3>PORTRAIT_DATA (IMGBB_HOSTED)</h3>
        <div class="portrait-manager" id="portrait-manager"></div>
        
        <h3 style="margin-top:15px">SPRITE_ASSETS</h3>
        <div id="upload-zones"></div>
    </div>
</div>

<input type="file" id="portrait-input" class="hidden" accept=".png">
<input type="file" id="single-file-input" class="hidden">

<footer>Island Mon Registry v12.1 • Firebase Cloud Sync • Procedural Island Generator</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyANWSTb5grj5F1aUj0XV59edJ1Vx6dKaew",
    authDomain: "pkmn-island.firebaseapp.com",
    projectId: "pkmn-island",
    storageBucket: "pkmn-island.firebasestorage.app",
    messagingSenderId: "521942701562",
    appId: "1:521942701562:web:000b66549f77db36f84043"
  };

  const app = initializeApp(firebaseConfig);
  window.db = getFirestore(app);
  window.fbDoc = doc; 
  window.fbGet = getDoc; 
  window.fbSet = setDoc;
</script>

<script>
    const IMGBB_KEY = 'bd7416e31a82ad846b1e4d3cc30eded6';
    const HABITATS = ['Forest', 'Canopy', 'Cave', 'River', 'Beach'];
    const ANIMS = ['Walk', 'Hop', 'Idle', 'Sleep', 'Hurt', 'Attack', 'Charge', 'Shoot', 'Strike'];
    const TERRAIN = { 
        OPEN_FOREST: { name: 'Open Forest', color: '#44a044', biome: 'Forest' }, 
        DENSE_FOREST: { name: 'Dense Forest', color: '#1a5e1a', biome: 'Canopy' }, 
        CAVE: { name: 'Cave System', color: '#555555', biome: 'Cave' }, 
        RIVERBANK: { name: 'Riverbank', color: '#4488ff', biome: 'River' }, 
        SHORE: { name: 'Shoreline', color: '#d2b48c', biome: 'Beach' }, 
        OCEAN: { name: 'Ocean', color: '#00008b', biome: 'None' } 
    };

    // STATE MANAGEMENT
    let mons = JSON.parse(localStorage.getItem('island_mons_v12') || '[]');
    let currentMonId = null;
    let activeHabitatFilter = null;
    let currentIsland = null;
    let islandLoop = null;
    let detailRequest = null;

    // VIEW MANAGEMENT
    function showView(viewId) {
        ['grid-view', 'detail-view', 'island-view', 'cloud-view'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.classList.add('hidden');
        });
        
        if (viewId === 'detail') {
            document.getElementById('detail-view').classList.remove('hidden');
        } else {
            const target = document.getElementById(viewId + '-view');
            if (target) target.classList.remove('hidden');
        }

        if (islandLoop) cancelAnimationFrame(islandLoop);
        if (detailRequest) cancelAnimationFrame(detailRequest);
        
        if (viewId === 'island') initIslandGen();
        if (viewId === 'grid') renderGrid();
    }

    // IMGBB UPLOAD
    async function uploadToImgBB(file) {
        const status = document.getElementById('cloud-status');
        if(status) status.innerText = "UPLOADING ASSET TO IMGBB...";
        
        const formData = new FormData();
        formData.append('image', file);
        
        try {
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            if(status) status.innerText = "UPLOAD COMPLETE.";
            return data.data.url;
        } catch (e) {
            if(status) status.innerText = "IMG_UPLOAD_FAILED.";
            console.error(e);
            return null;
        }
    }

    // LOCAL STORAGE
    function save() {
        localStorage.setItem('island_mons_v12', JSON.stringify(mons));
    }

    function addNewMon() {
        const id = "MON_" + Date.now();
        const newMon = {
            id,
            name: 'NEW_ENTITY',
            habitat: 'Forest',
            portraits: [null, null, null, null, null],
            assets: {},
            xmlData: null
        };
        mons.push(newMon);
        save();
        openDetail(id);
    }

    // CLOUD SYNC: FIRESTORE
    async function saveToCloud() {
        const code = document.getElementById('cloud-code-input').value.trim().toUpperCase();
        if(!code) return alert("PLEASE ENTER A REGISTRY CODE NAME.");
        
        const status = document.getElementById('cloud-status');
        status.innerText = "UPLOADING REGISTRY TO CLOUD...";
        
        try {
            await window.fbSet(window.fbDoc(window.db, "registries", code), {
                seed: document.getElementById('map-seed').value,
                mons: mons,
                timestamp: Date.now(),
                version: "12.1"
            });
            status.innerText = `SUCCESS: REGISTRY [${code}] PUBLISHED.`;
        } catch (e) {
            console.error(e);
            status.innerText = "CLOUD_ERROR: CHECK NETWORK OR PERMISSIONS.";
        }
    }

    async function loadFromCloud() {
        const code = document.getElementById('cloud-code-input').value.trim().toUpperCase();
        if(!code) return alert("ENTER A CODE TO SEARCH.");
        
        const status = document.getElementById('cloud-status');
        status.innerText = "SEARCHING DATABASE...";
        
        try {
            const snap = await window.fbGet(window.fbDoc(window.db, "registries", code));
            if(snap.exists()) {
                const data = snap.data();
                mons = data.mons;
                document.getElementById('map-seed').value = data.seed;
                save();
                status.innerText = `SYNCED: WORLD [${code}] LOADED.`;
                setTimeout(() => showView('grid'), 1000);
            } else {
                status.innerText = "ERROR: CODE NOT FOUND IN REGISTRY.";
            }
        } catch (e) {
            console.error(e);
            status.innerText = "FETCH_FAILED: CONNECTION INTERRUPTED.";
        }
    }

    // REGISTRY UI
    function renderGrid() {
        const grid = document.getElementById('mon-grid');
        const searchTerm = document.getElementById('search').value.toLowerCase();
        grid.innerHTML = '';
        
        const filtered = mons.filter(m => {
            const matchesSearch = m.name.toLowerCase().includes(searchTerm);
            const matchesHabitat = !activeHabitatFilter || m.habitat === activeHabitatFilter;
            return matchesSearch && matchesHabitat;
        });
        
        filtered.forEach(mon => {
            const card = document.createElement('div');
            card.className = 'mon-card';
            card.onclick = () => openDetail(mon.id);
            
            const portraitUrl = mon.portraits.find(p => p !== null) || 'https://via.placeholder.com/64?text=?';
            
            card.innerHTML = `
                <img src="${portraitUrl}" style="width:64px; height:64px; image-rendering: pixelated;">
                <div class="name">${mon.name}</div>
                <div style="font-size:0.6rem; color:#666;">${mon.habitat.toUpperCase()}</div>
            `;
            grid.appendChild(card);
        });
    }

    function renderHabitatFilters() {
        const container = document.getElementById('habitat-filters');
        container.innerHTML = HABITATS.map(h => `
            <div class="filter-chip ${activeHabitatFilter === h ? 'active' : ''}" 
                 onclick="toggleHabitatFilter('${h}')">${h}</div>
        `).join('');
    }

    function toggleHabitatFilter(h) {
        activeHabitatFilter = (activeHabitatFilter === h) ? null : h;
        renderHabitatFilters();
        renderGrid();
    }

    // DETAIL VIEW
    function openDetail(id) {
        currentMonId = id;
        const mon = mons.find(m => m.id === id);
        showView('detail');
        
        document.getElementById('edit-name').value = mon.name;
        renderHabitatSelectors();
        renderPortraitManager();
        setupUploadZones();
        updateUploadCheckmarks();
    }

    function updateCurrentMon(field, value) {
        const index = mons.findIndex(m => m.id === currentMonId);
        if (index !== -1) {
            mons[index][field] = value;
            save();
        }
    }

    function renderHabitatSelectors() {
        const mon = mons.find(m => m.id === currentMonId);
        const container = document.getElementById('habitat-select');
        container.innerHTML = HABITATS.map(h => `
            <div class="filter-chip ${mon.habitat === h ? 'active' : ''}" 
                 onclick="updateCurrentMon('habitat', '${h}'); renderHabitatSelectors();">${h}</div>
        `).join('');
    }

    // PORTRAIT MANAGEMENT
   // PORTRAIT MANAGEMENT
    function renderPortraitManager() {
        const mon = mons.find(m => m.id === currentMonId);
        const container = document.getElementById('portrait-manager');
        container.innerHTML = '';
        
        // Get non-null portraits for slideshow
        const validPortraits = mon.portraits.filter(p => p !== null);
        
        if (validPortraits.length > 0) {
            // Create animated slideshow slot
            const slot = document.createElement('div');
            slot.className = 'portrait-slot active';
            slot.onclick = () => {
                window.currentTargetSlot = 0;
                document.getElementById('portrait-input').click();
            };
            
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            let currentFrame = 0;
            const images = validPortraits.map(url => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.src = url;
                return img;
            });
            
            function animateSlideshow() {
                if (images[currentFrame] && images[currentFrame].complete) {
                    ctx.clearRect(0, 0, 64, 64);
                    ctx.drawImage(images[currentFrame], 0, 0, 64, 64);
                }
                currentFrame = (currentFrame + 1) % images.length;
            }
            
            setInterval(animateSlideshow, 500); // 500ms per frame
            slot.appendChild(canvas);
            container.appendChild(slot);
            
        } else {
            // Empty slot with + button
            const slot = document.createElement('div');
            slot.className = 'portrait-slot';
            slot.onclick = () => {
                window.currentTargetSlot = 0;
                document.getElementById('portrait-input').click();
            };
            slot.innerHTML = `<span style="color:#333; font-size:1.2rem;">+</span>`;
            container.appendChild(slot);
        }
    }

document.getElementById('portrait-input').onchange = async (e) => {
        if (!e.target.files[0]) return;
        
        const file = e.target.files[0];
        const mon = mons.find(m => m.id === currentMonId);
        
        // Parse spritesheet into individual frames
        const frames = await parseSpritesheetToFrames(file);
        
        if (frames.length > 0) {
            // Upload all non-blank frames to ImgBB
            const uploadPromises = frames.map(blob => uploadToImgBB(blob));
            const urls = await Promise.all(uploadPromises);
            
            // Store URLs in portraits array
            urls.forEach((url, i) => {
                if (i < 5 && url) mon.portraits[i] = url;
            });
            
            save();
            renderPortraitManager();
        }
    };
    
    // Parse spritesheet into frames, skip blank tiles
    async function parseSpritesheetToFrames(file) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // Detect grid size (assume square tiles)
                const tileSize = Math.min(img.width, img.height);
                const cols = Math.floor(img.width / tileSize);
                const rows = Math.floor(img.height / tileSize);
                
                canvas.width = tileSize;
                canvas.height = tileSize;
                
                const frames = [];
                
                for (let y = 0; y < rows; y++) {
                    for (let x = 0; x < cols; x++) {
                        ctx.clearRect(0, 0, tileSize, tileSize);
                        ctx.drawImage(img, x * tileSize, y * tileSize, tileSize, tileSize, 0, 0, tileSize, tileSize);
                        
                        // Check if tile is blank (all transparent or black)
                        if (!isTileBlank(ctx, tileSize)) {
                            canvas.toBlob(blob => frames.push(blob), 'image/png');
                        }
                    }
                }
                
                // Wait a bit for all blobs to be created
                setTimeout(() => resolve(frames), 100);
            };
            img.src = URL.createObjectURL(file);
        });
    }
    
    function isTileBlank(ctx, size) {
        const imgData = ctx.getImageData(0, 0, size, size);
        const pixels = imgData.data;
        let hasContent = false;
        
        for (let i = 0; i < pixels.length; i += 4) {
            const a = pixels[i + 3]; // Alpha
            const r = pixels[i], g = pixels[i + 1], b = pixels[i + 2];
            
            // If pixel is not transparent and not pure black
            if (a > 10 && (r > 5 || g > 5 || b > 5)) {
                hasContent = true;
                break;
            }
        }
        return !hasContent;
    }

    // SPRITE & XML MANAGEMENT
    function setupUploadZones() {
        const container = document.getElementById('upload-zones');
        const keys = [...ANIMS.map(a => a + '-Anim'), 'AnimData.xml'];
        
        container.innerHTML = keys.map(key => `
            <div class="upload-zone" id="z-${key}" onclick="triggerAssetUpload('${key}')">
                <span>${key}</span>
                <span class="chk"></span>
            </div>
        `).join('');
    }

    function triggerAssetUpload(key) {
        const input = document.getElementById('single-file-input');
        input.onchange = async (e) => {
            if (!e.target.files[0]) return;
            const mon = mons.find(m => m.id === currentMonId);

            if (key === 'AnimData.xml') {
                const text = await e.target.files[0].text();
                mon.xmlData = text;
            } else {
                const url = await uploadToImgBB(e.target.files[0]);
                if (url) mon.assets[key] = url;
            }
            save();
            updateUploadCheckmarks();
        };
        input.click();
    }

    function updateUploadCheckmarks() {
        const m = mons.find(mon => mon.id === currentMonId);
        if (!m) return;
        
        document.querySelectorAll('.upload-zone').forEach(zone => {
            const key = zone.id.replace('z-', '');
            const hasFile = (key === 'AnimData.xml') ? !!m.xmlData : !!m.assets[key];
            zone.classList.toggle('loaded', hasFile);
            zone.querySelector('.chk').innerText = hasFile ? '✓' : '';
        });
    }

    function deleteCurrentMon() {
        if (confirm("ERASE THIS ENTITY FROM REGISTRY?")) {
            mons = mons.filter(m => m.id !== currentMonId);
            save();
            showView('grid');
        }
    }

    // ISLAND GENERATOR - DETERMINISTIC SEED
    function mulberry32(a) {
        return function() {
            var t = a += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }
    }

    function initIslandGen() {
        const seedInput = document.getElementById('map-seed').value;
        const seed = parseInt(seedInput) || 12345;
        const random = mulberry32(seed);
        
        currentIsland = generateIslandLayout(random);
        spawnPopulations(random);
        renderIslandMain();
        
        document.getElementById('tile-panel').classList.add('hidden');
    }

    function generateIslandLayout(rng) {
        const size = 10;
        let tiles = [];
        
        for (let y = 0; y < size; y++) {
            for (let x = 0; x < size; x++) {
                let type = 'OPEN_FOREST';
                const edge = (x === 0 || x === 9 || y === 0 || y === 9);
                
                if (edge) {
                    type = rng() > 0.7 ? 'OCEAN' : 'SHORE';
                } else if (rng() > 0.9) {
                    type = 'CAVE';
                } else if (rng() > 0.7) {
                    type = 'DENSE_FOREST';
                }
                
                tiles.push({ x, y, type, inhabitants: [] });
            }
        }
        
        // Random River
        let rx = Math.floor(rng() * 6) + 2;
        for (let ry = 0; ry < 10; ry++) {
            tiles[ry * 10 + rx].type = 'RIVERBANK';
            if (rng() > 0.5 && rx > 1 && rx < 8) {
                rx += (rng() > 0.5 ? 1 : -1);
            }
        }
        return tiles;
    }

    function spawnPopulations(rng) {
        currentIsland.forEach(tile => {
            const possible = mons.filter(m => m.habitat === TERRAIN[tile.type].biome);
            if (possible.length > 0 && rng() > 0.5) {
                const count = Math.floor(rng() * 3) + 1;
                for (let i = 0; i < count; i++) {
                    const species = possible[Math.floor(rng() * possible.length)];
                    tile.inhabitants.push({
                        id: species.id,
                        name: species.name,
                        lx: rng() * 20 + 2,
                        ly: rng() * 20 + 2,
                        vx: (rng() - 0.5) * 0.1,
                        vy: (rng() - 0.5) * 0.1,
                        isSleeping: rng() > 0.8
                    });
                }
            }
        });
    }

    // ISLAND RENDERING
    function renderIslandMain() {
        const canv = document.getElementById('island-canvas');
        const ictx = canv.getContext('2d');
        
        function loop() {
            ictx.clearRect(0, 0, 300, 300);
            
            currentIsland.forEach(t => {
                ictx.fillStyle = TERRAIN[t.type].color;
                ictx.fillRect(t.x * 30, t.y * 30, 29, 29);
                
                t.inhabitants.forEach(m => {
                    if (!m.isSleeping) {
                        m.lx += m.vx;
                        m.ly += m.vy;
                        if (m.lx < 2 || m.lx > 27) m.vx *= -1;
                        if (m.ly < 2 || m.ly > 27) m.vy *= -1;
                    }
                    ictx.fillStyle = m.isSleeping ? '#fff' : '#000';
                    ictx.fillRect(t.x * 30 + m.lx, t.y * 30 + m.ly, 3, 3);
                });
            });
            
            islandLoop = requestAnimationFrame(loop);
        }
        loop();
    }

    // TILE INTERACTION
    document.getElementById('island-canvas').onclick = function(e) {
        const rect = this.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / (rect.width / 10));
        const y = Math.floor((e.clientY - rect.top) / (rect.height / 10));
        const tile = currentIsland.find(t => t.x === x && t.y === y);
        if (tile) openTileDetail(tile);
    };

    function openTileDetail(tile) {
        const panel = document.getElementById('tile-panel');
        panel.classList.remove('hidden');
        document.getElementById('tile-terrain-label').innerText = `SECTOR_${tile.x}_${tile.y}: ${tile.type}`;
        
        const dctx = document.getElementById('tile-detail-canvas').getContext('2d');
        const population = tile.inhabitants.map(m => m.name).join(', ') || 'NO_SIGNALS';
        document.getElementById('tile-mon-list').innerText = `DETECTED: ${population}`;

        function detailLoop(time) {
            dctx.fillStyle = TERRAIN[tile.type].color;
            dctx.fillRect(0, 0, 200, 200);
            
            tile.inhabitants.forEach((m, i) => {
                const monData = mons.find(s => s.id === m.id);
                dctx.fillStyle = m.isSleeping ? '#fff' : '#39ff14';
                dctx.beginPath();
                dctx.arc(m.lx * 6, m.ly * 6, 8, 0, Math.PI * 2);
                dctx.fill();
            });
            detailRequest = requestAnimationFrame(detailLoop);
        }
        detailLoop(0);
    }

    // INITIALIZE
    window.onload = () => {
        renderHabitatFilters();
        renderGrid();
    };
</script>
</body>
</html>

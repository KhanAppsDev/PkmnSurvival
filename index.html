<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Island Mon Registry v8</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070708;
            --surface: rgba(20, 20, 23, 0.6);
            --accent-cyan: #00f2ff;
            --accent-green: #39ff14;
            --text: #e0e0e0;
            --border: rgba(42, 42, 46, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            margin: 0; padding: 0; width: 100vw; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1c 0%, #070708 100%);
        }

        header {
            padding: 10px 15px; border-bottom: 1px solid var(--border);
            background: rgba(10, 10, 11, 0.8); backdrop-filter: blur(5px);
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
        }

        .btn {
            background: transparent; border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan); padding: 4px 10px; cursor: pointer;
            font-family: inherit; font-size: 0.7rem; text-transform: uppercase;
        }

        #grid-view { padding: 15px; }
        .search-bar {
            background: transparent; border: none; border-bottom: 1px solid var(--border);
            color: var(--accent-green); padding: 12px; width: 100%; font-family: inherit; font-size: 1rem;
            margin-bottom: 20px; outline: none;
        }

        .mon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }

        /* Minimalist Card Design */
        .mon-card {
            background: transparent; border: 1px solid transparent;
            padding: 10px; transition: all 0.3s ease; position: relative;
        }
        .mon-card:hover { border-color: var(--border); background: var(--surface); }
        
        .card-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 8px; }
        .portrait-main { width: 40px; height: 40px; image-rendering: pixelated; object-fit: none; margin-bottom: 5px; }
        .mon-name { font-size: 0.8rem; color: var(--accent-cyan); letter-spacing: 1px; }

        .preview-strip {
            display: flex; justify-content: space-around; align-items: flex-end;
            margin-top: 10px; min-height: 40px;
        }
        .mini-preview-container { text-align: center; }
        .mini-preview { image-rendering: pixelated; background: transparent; display: block; margin: 0 auto; }
        .mini-label { font-size: 0.45rem; color: #555; margin-top: 2px; text-transform: uppercase; }

        .config-btn {
            position: absolute; top: 5px; right: 5px; font-size: 0.8rem;
            cursor: pointer; opacity: 0.3; color: var(--text);
        }
        .mon-card:hover .config-btn { opacity: 1; }

        /* Detail View Styles */
        #detail-view { display: none; padding: 15px; max-width: 600px; margin: 0 auto; }
        .editor-section { margin-bottom: 25px; }
        h3 { font-size: 0.7rem; color: var(--accent-cyan); text-transform: uppercase; margin-bottom: 10px; opacity: 0.8; }

        .portrait-manager { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; }
        .portrait-slot {
            width: 50px; height: 50px; border: 1px dashed var(--border);
            display: flex; align-items: center; justify-content: center; position: relative;
            flex-shrink: 0; cursor: pointer;
        }
        .portrait-slot img { width: 100%; height: 100%; object-fit: none; image-rendering: pixelated; }
        .slot-num { position: absolute; top: -5px; left: -5px; font-size: 0.5rem; background: var(--bg); padding: 2px; }

        #canvas-container {
            width: 100%; aspect-ratio: 1/1; background: rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center; border: 1px solid var(--border);
        }
        canvas { image-rendering: pixelated; }

        .hidden { display: none !important; }

        /* Custom Selector Overlay */
        #selector-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
    </style>
</head>
<body>

<header>
    <div style="color: var(--accent-cyan); font-size: 0.7rem; opacity: 0.6;">RSTRY_CORE_V8</div>
    <div style="display: flex; gap: 8px;">
        <button class="btn" onclick="document.getElementById('import-input').click()">Load</button>
        <button class="btn" onclick="exportData()">Exp</button>
        <button class="btn" onclick="addNewMon()" style="border-color: var(--accent-green); color: var(--accent-green);">+ Add</button>
    </div>
</header>

<input type="file" id="import-input" class="hidden" accept=".json" onchange="importData(this.files[0])">

<div id="grid-view">
    <input type="text" id="search" class="search-bar" placeholder="SEARCH ENTITIES..." oninput="renderGrid()">
    <div class="mon-grid" id="mon-grid"></div>
</div>

<div id="detail-view">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <button class="btn" onclick="showGrid()">&lt; EXIT</button>
        <button class="btn" onclick="deleteCurrentMon()" style="border-color: #ff3e3e; color: #ff3e3e;">PURGE</button>
    </div>

    <div class="editor-section">
        <h3>Identity</h3>
        <input type="text" id="edit-name" class="search-bar" style="font-size: 1.2rem; margin-bottom: 10px;" onchange="updateCurrentMon('name', this.value)">
    </div>

    <div class="editor-section">
        <h3>Portraits (1-5)</h3>
        <div class="portrait-manager" id="portrait-manager"></div>
        <input type="file" id="portrait-input" class="hidden" accept=".png">
    </div>

    <div class="editor-section">
        <h3>Visualizer</h3>
        <div id="canvas-container">
            <canvas id="sprite-canvas"></canvas>
        </div>
        <div style="display:flex; justify-content: space-between; margin-top:10px;">
            <button class="btn" onclick="changeDir(-1)">◀</button>
            <div id="active-anim-name" style="font-size:0.7rem; color:var(--accent-cyan)">Idle</div>
            <button class="btn" onclick="changeDir(1)">▶</button>
        </div>
        <div id="anim-tabs" style="display:flex; overflow-x:auto; gap:5px; margin-top:10px; padding-bottom:5px;"></div>
    </div>
</div>

<div id="selector-overlay">
    <h3 id="selector-title">Select Previews</h3>
    <div id="anim-selector-list" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; width:100%; max-width:400px; margin-bottom:20px;"></div>
    <button class="btn" onclick="closeSelector()">Close</button>
</div>

<script>
    const ANIMS = ['Walk', 'Hop', 'Idle', 'Sleep', 'Hurt', 'Attack', 'Charge', 'Shoot', 'Strike', 'Withdraw', 'Eat', 'Faint'];
    const DIRS = ['DR', 'R', 'UR', 'U', 'UL', 'L', 'DL', 'D'];
    
    let mons = JSON.parse(localStorage.getItem('island_mons_v8') || '[]');
    let currentMonId = null;
    let currentDir = 0;
    let globalPortraitIdx = 0;
    let gridAnims = [];
    let lastRotation = Date.now();
    let lastPortraitShift = Date.now();

    const canvas = document.getElementById('sprite-canvas');
    const ctx = canvas.getContext('2d');
    let detailLoop = null;
    let activeDetailAnim = 'Idle';

    function init() {
        renderGrid();
        requestAnimationFrame(globalLoop);
    }

    // --- Core Logic ---
    function getAnimData(xmlString, animName) {
        if (!xmlString) return null;
        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlString, "text/xml");
        const anims = Array.from(xml.getElementsByTagName('Anim'));
        let target = anims.find(a => a.querySelector('Name').textContent === animName);
        if (!target) return null;
        if (target.querySelector('CopyOf')) return getAnimData(xmlString, target.querySelector('CopyOf').textContent);

        const fw = parseInt(target.querySelector('FrameWidth').textContent);
        const fh = parseInt(target.querySelector('FrameHeight').textContent);
        
        return {
            fw, fh,
            durs: Array.from(target.getElementsByTagName('Duration')).map(d => parseInt(d.textContent))
        };
    }

    function isDirectional(mon, animName, data) {
        if (!mon.assets[animName + '-Anim'] || !data) return false;
        // Logic: If the total image height equals the height of one frame, it's non-directional
        const img = new Image(); img.src = mon.assets[animName + '-Anim'];
        return img.height > data.fh;
    }

    // --- Grid Rendering ---
    function renderGrid() {
        const grid = document.getElementById('mon-grid');
        grid.innerHTML = ''; gridAnims = [];
        const search = document.getElementById('search').value.toLowerCase();

        mons.filter(m => m.name.toLowerCase().includes(search)).forEach(mon => {
            const card = document.createElement('div');
            card.className = 'mon-card';
            
            const portraits = mon.portraits.filter(p => !!p);
            const pSrc = portraits.length > 0 ? portraits[globalPortraitIdx % portraits.length] : '';
            const previews = mon.previewAnims || ['Walk', 'Idle', 'Attack'];

            card.innerHTML = `
                <div class="config-btn" onclick="openSelector(event, '${mon.id}')">⚙</div>
                <div class="card-header" onclick="openDetail('${mon.id}')">
                    <img src="${pSrc}" class="portrait-main">
                    <div class="mon-name">${mon.name}</div>
                </div>
                <div class="preview-strip">
                    ${previews.map(p => `
                        <div class="mini-preview-container">
                            <canvas id="p-${mon.id}-${p}" class="mini-preview"></canvas>
                            <div class="mini-label">${p}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            grid.appendChild(card);

            previews.forEach(p => {
                if (mon.assets[p + '-Anim'] && mon.xmlData) {
                    const img = new Image(); img.src = mon.assets[p + '-Anim'];
                    gridAnims.push({ canvasId: `p-${mon.id}-${p}`, mon, anim: p, img, frame: 0, last: 0 });
                }
            });
        });
    }

    function globalLoop() {
        const now = Date.now();
        if (now - lastRotation > 2000) { currentDir = (currentDir + 1) % 8; lastRotation = now; }
        if (now - lastPortraitShift > 3000) { globalPortraitIdx++; lastPortraitShift = now; renderGrid(); }

        gridAnims.forEach(a => {
            const data = getAnimData(a.mon.xmlData, a.anim);
            const canv = document.getElementById(a.canvasId);
            if (!data || !canv) return;

            if (now - a.last >= data.durs[a.frame] * 16.6) {
                a.frame = (a.frame + 1) % data.durs.length; a.last = now;
            }

            canv.width = data.fw; canv.height = data.fh;
            const ctxm = canv.getContext('2d');
            ctxm.imageSmoothingEnabled = false;
            ctxm.clearRect(0,0,data.fw, data.fh);

            // Row selection logic: check if the sheet supports directions
            const row = (a.img.height > data.fh) ? currentDir : 0;
            ctxm.drawImage(a.img, a.frame * data.fw, row * data.fh, data.fw, data.fh, 0, 0, data.fw, data.fh);
        });
        requestAnimationFrame(globalLoop);
    }

    // --- Config Selector ---
    function openSelector(e, id) {
        e.stopPropagation();
        currentMonId = id;
        const mon = mons.find(m => m.id === id);
        const overlay = document.getElementById('selector-overlay');
        const list = document.getElementById('anim-selector-list');
        overlay.style.display = 'flex';
        list.innerHTML = '';

        ANIMS.forEach(a => {
            const btn = document.createElement('div');
            btn.className = `btn ${mon.previewAnims?.includes(a) ? 'active' : ''}`;
            btn.style.textAlign = 'center';
            btn.innerText = a;
            btn.onclick = () => togglePreviewAnim(a);
            list.appendChild(btn);
        });
    }

    function togglePreviewAnim(anim) {
        const mon = mons.find(m => m.id === currentMonId);
        if (!mon.previewAnims) mon.previewAnims = ['Walk', 'Idle', 'Attack'];
        
        if (mon.previewAnims.includes(anim)) {
            mon.previewAnims = mon.previewAnims.filter(a => a !== anim);
        } else if (mon.previewAnims.length < 3) {
            mon.previewAnims.push(anim);
        }
        save();
        openSelector({stopPropagation:()=>{}}, currentMonId);
    }

    function closeSelector() {
        document.getElementById('selector-overlay').style.display = 'none';
        renderGrid();
    }

    // --- Detail View ---
    function openDetail(id) {
        currentMonId = id;
        const mon = mons.find(m => m.id === id);
        document.getElementById('grid-view').classList.add('hidden');
        document.getElementById('detail-view').style.display = 'block';
        document.getElementById('edit-name').value = mon.name;
        
        renderPortraitManager();
        renderAnimTabs();
        setDetailAnim('Idle');
    }

    function renderAnimTabs() {
        const mon = mons.find(m => m.id === currentMonId);
        const container = document.getElementById('anim-tabs');
        container.innerHTML = ANIMS.map(a => {
            const has = !!mon.assets[a + '-Anim'];
            return `<div class="btn" style="opacity:${has?1:0.3}" onclick="setDetailAnim('${a}')">${a}</div>`;
        }).join('');
    }

    function setDetailAnim(anim) {
        activeDetailAnim = anim;
        document.getElementById('active-anim-name').innerText = anim;
        const mon = mons.find(m => m.id === currentMonId);
        cancelAnimationFrame(detailLoop);

        const data = getAnimData(mon.xmlData, anim);
        if (!data || !mon.assets[anim + '-Anim']) {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            return;
        }

        const img = new Image(); img.src = mon.assets[anim + '-Anim'];
        img.onload = () => {
            canvas.width = data.fw * 2; canvas.height = data.fh * 2;
            let f = 0; let last = 0;
            function loop(now) {
                if (now - last > data.durs[f] * 16.6) { f = (f+1)%data.durs.length; last = now; }
                ctx.clearRect(0,0,canvas.width,canvas.height);
                const row = (img.height > data.fh) ? currentDir : 0;
                ctx.drawImage(img, f*data.fw, row*data.fh, data.fw, data.fh, 0, 0, data.fw*2, data.fh*2);
                detailLoop = requestAnimationFrame(loop);
            }
            detailLoop = requestAnimationFrame(loop);
        };
    }

    function renderPortraitManager() {
        const mon = mons.find(m => m.id === currentMonId);
        const container = document.getElementById('portrait-manager');
        container.innerHTML = '';
        for (let i = 0; i < 5; i++) {
            const slot = document.createElement('div');
            slot.className = 'portrait-slot';
            slot.onclick = () => { currentTargetSlot = i; document.getElementById('portrait-input').click(); };
            if (mon.portraits[i]) slot.innerHTML = `<img src="${mon.portraits[i]}">`;
            slot.innerHTML += `<div class="slot-num">${i+1}</div>`;
            container.appendChild(slot);
        }
    }

    // --- Data Utilities ---
    function save() { localStorage.setItem('island_mons_v8', JSON.stringify(mons)); }
    function showGrid() { 
        document.getElementById('detail-view').style.display = 'none'; 
        document.getElementById('grid-view').classList.remove('hidden'); 
        renderGrid(); 
    }
    function updateCurrentMon(k, v) { const idx = mons.findIndex(m => m.id === currentMonId); mons[idx][k] = v; save(); }
    function addNewMon() {
        const id = Date.now().toString();
        mons.push({ id, name: 'NEW_ENTITY', portraits: [null,null,null,null,null], assets: {}, xmlData: null, previewAnims: ['Walk','Idle','Attack'] });
        save(); openDetail(id);
    }
    function exportData() {
        const blob = new Blob([JSON.stringify(mons)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'mon_registry_v8.json'; a.click();
    }
    function importData(file) {
        const r = new FileReader();
        r.onload = e => { mons = JSON.parse(e.target.result); save(); location.reload(); };
        r.readAsText(file);
    }

    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Island Mon Registry v12 - Topo-Elevation</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0b; --surface: #141417; --accent-cyan: #00f2ff;
            --accent-green: #39ff14; --accent-amber: #ffb100; --accent-red: #ff3e3e;
            --text: #e0e0e0; --border: #2a2a2e;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; margin: 0; padding: 0; width: 100vw; overflow-x: hidden; }
        body::before { content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); z-index: 9999; background-size: 100% 3px, 2px 100%; pointer-events: none; }
        header { padding: 10px 15px; border-bottom: 1px solid var(--accent-cyan); background: var(--surface); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: transparent; border: 1px solid var(--accent-cyan); color: var(--accent-cyan); padding: 6px 12px; cursor: pointer; font-family: inherit; font-size: 0.75rem; text-transform: uppercase; }
        #grid-view, #island-view { padding: 15px; }
        .search-bar { background: #000; border: 1px solid var(--border); color: var(--accent-green); padding: 12px; width: 100%; font-family: inherit; font-size: 1rem; margin-bottom:10px; }
        .mon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 12px; }
        .mon-card { background: var(--surface); border: 1px solid var(--border); padding: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .mon-card .name { font-size: 0.9rem; color: var(--accent-cyan); margin: 5px 0; }
        #detail-view { display: none; padding: 15px; }
        .editor-section { background: var(--surface); padding: 15px; border: 1px solid var(--border); margin-bottom: 15px; }
        canvas { image-rendering: pixelated; }
        .hidden { display: none !important; }
        #island-view { flex-direction: column; align-items: center; display: none; }
        #island-view.active { display: flex; }
        .filter-chip { padding: 4px 10px; border: 1px solid var(--border); font-size: 0.7rem; cursor: pointer; margin-right:5px; margin-bottom:5px; display:inline-block;}
        .filter-chip.active { border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .tabs { display: flex; overflow-x: auto; gap: 5px; margin-bottom: 10px; }
        .tab { padding: 6px 10px; background: #000; border: 1px solid var(--border); font-size: 0.7rem; cursor: pointer; }
        .tab.active { border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .upload-zone { background: #000; border: 1px dashed var(--border); padding: 8px; font-size: 0.6rem; cursor: pointer; display:flex; justify-content: space-between; margin-bottom:4px;}
        .upload-zone.loaded { border-color: var(--accent-green); color: var(--accent-green); }
    </style>
</head>
<body>

<header>
    <div style="color: var(--accent-cyan); font-weight: bold; font-size: 0.8rem;">ISLAND_REGISTRY_V12</div>
    <div style="display: flex; gap: 6px;">
        <button class="btn" onclick="showView('island')" style="border-color: var(--accent-amber); color: var(--accent-amber);">Explore Map</button>
        <button class="btn" onclick="addNewMon()" style="border-color: var(--accent-green); color: var(--accent-green);">+ Add Mon</button>
    </div>
</header>

<div id="grid-view">
    <input type="text" id="search" class="search-bar" placeholder="SEARCH_REGISTRY..." oninput="renderGrid()">
    <div id="habitat-filters" style="margin-bottom:15px;"></div>
    <div class="mon-grid" id="mon-grid"></div>
</div>

<div id="island-view">
    <div style="width: 100%; display: flex; justify-content: space-between; margin-bottom: 15px;">
        <button class="btn" onclick="showView('grid')">&lt; REGISTRY</button>
        <div style="display: flex; gap: 5px;">
            <input type="number" id="map-seed" value="777" style="width: 60px; background: #000; border: 1px solid var(--border); color: var(--accent-cyan); font-family: inherit;">
            <button class="btn" onclick="initIslandGen()" style="border-color: var(--accent-green);">GENERATE</button>
        </div>
    </div>
    <canvas id="island-canvas" width="300" height="300" style="border: 1px solid #fff; width: 300px; height: 300px;"></canvas>
    
    <div id="tile-panel" class="editor-section hidden" style="width: 100%; margin-top: 20px; max-width: 400px;">
        <h3 id="tile-terrain-label" style="font-size:0.8rem; color:var(--accent-cyan)">BIOME_DATA</h3>
        <canvas id="tile-detail-canvas" width="200" height="200" style="background: #000; border: 1px solid var(--border); display: block; margin: 0 auto;"></canvas>
        <div id="tile-mon-list" style="margin-top: 10px; font-size: 0.65rem; color: #aaa; text-align: center;"></div>
    </div>
</div>

<div id="detail-view">
    <button class="btn" onclick="showView('grid')" style="margin-bottom:15px;">&lt; BACK</button>
    <div class="editor-section">
        <label style="font-size:0.6rem; color:#888;">SPECIES IDENTIFIER</label>
        <input type="text" id="edit-name" onchange="updateMon('name', this.value)" style="width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:10px; font-family:inherit;">
        
        <label style="font-size:0.6rem; color:#888; display:block; margin-top:15px;">CORE HABITAT</label>
        <div id="habitat-select" style="margin-top:5px;"></div>
        
        <div class="upload-grid" id="upload-zones" style="margin-top:15px;"></div>
    </div>
    <div class="editor-section">
        <div class="tabs" id="preview-tabs"></div>
        <div style="background:#000; border:1px solid var(--border); display:flex; justify-content:center; align-items:center; height:180px;">
            <canvas id="sprite-canvas"></canvas>
        </div>
    </div>
    <button class="btn" onclick="deleteMon()" style="border-color:var(--accent-red); color:var(--accent-red); width:100%;">ERASE DATA</button>
</div>

<input type="file" id="single-file-input" class="hidden">

<script>
    const HABITATS = ['Forest Floor', 'Canopy', 'Cave', 'Riverbank', 'Mountain'];
    const TERRAIN = {
        OCEAN: { color: '#002b55', biome: 'None' },
        SHORE: { color: '#e3c6a0', biome: 'Riverbank' },
        GRASS: { color: '#4d9a4d', biome: 'Forest Floor' },
        FOREST: { color: '#1a5e1a', biome: 'Canopy' },
        CAVE: { color: '#333333', biome: 'Cave' },
        MOUNTAIN: { color: '#7a5a40', biome: 'Mountain' },
        PEAK: { color: '#ffffff', biome: 'Mountain' },
        RIVER: { color: '#33ccff', biome: 'Riverbank' }
    };

    let mons = JSON.parse(localStorage.getItem('island_mons_v12') || '[]');
    let currentMonId = null, activeTab = 'Walk', activeHabitatFilter = null;
    let currentIsland = [], islandWalkers = [], detailWalkers = [];
    let islandLoop, detailLoop;

    function init() {
        renderHabitatFilters();
        renderGrid();
        setupUploadZones();
        renderTabs();
    }

    function mulberry32(a) {
        return function() {
            var t = a += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }
    }

    function initIslandGen() {
        const seed = parseInt(document.getElementById('map-seed').value) || 123;
        const rng = mulberry32(seed);
        const size = 12; // 12x12 grid for better scaling
        currentIsland = [];

        // 1. Initial Heightmap/Elevation Gen
        let tempGrid = [];
        for(let y=0; y<size; y++) {
            for(let x=0; x<size; x++) {
                let distToEdge = Math.min(x, size-1-x, y, size-1-y);
                let elev = distToEdge * 2 + (rng() * 2); // Base elevation
                
                let type = 'GRASS';
                if (distToEdge === 0) type = 'OCEAN';
                else if (distToEdge === 1) type = (rng() > 0.3) ? 'SHORE' : 'OCEAN'; // Irregular shore
                else {
                    if (elev > 7) type = 'PEAK';
                    else if (elev > 5) type = 'MOUNTAIN';
                    else if (rng() > 0.8) type = 'CAVE';
                    else if (rng() > 0.6) type = 'FOREST';
                }
                tempGrid.push({ x, y, type, elev });
            }
        }

        // 2. Generate River & Delta
        let rx = Math.floor(rng() * 4) + 4;
        let ry = 2;
        while(ry < size-1) {
            let idx = ry * size + rx;
            if(tempGrid[idx]) tempGrid[idx].type = 'RIVER';
            
            // Branch out at the end for delta
            if(ry === size-2) {
                if(tempGrid[idx+1]) tempGrid[idx+1].type = 'RIVER';
                if(tempGrid[idx-1]) tempGrid[idx-1].type = 'RIVER';
            }
            
            ry++;
            if(rng() > 0.4) rx += (rng() > 0.5 ? 1 : -1);
            rx = Math.max(1, Math.min(size-2, rx));
        }

        currentIsland = tempGrid;
        spawnMons(rng);
        renderIslandCanvas();
        document.getElementById('tile-panel').classList.add('hidden');
    }

    function spawnMons(rng) {
        islandWalkers = [];
        currentIsland.forEach(tile => {
            const possible = mons.filter(m => m.habitat === TERRAIN[tile.type].biome);
            if(possible.length > 0 && rng() > 0.7) {
                const species = possible[Math.floor(rng() * possible.length)];
                const isSleep = rng() > 0.8;
                const mon = {
                    id: species.id, name: species.name, 
                    color: `hsl(${Math.abs(species.id % 360)}, 70%, 60%)`,
                    isSleep, tx: tile.x, ty: tile.y,
                    lx: rng()*18+4, ly: rng()*18+4,
                    vx: isSleep ? 0 : (rng()-0.5)*0.2, vy: isSleep ? 0 : (rng()-0.5)*0.2
                };
                tile.mons = tile.mons || [];
                tile.mons.push(mon);
                islandWalkers.push(mon);
            }
        });
    }

    function renderIslandCanvas() {
        const cvs = document.getElementById('island-canvas'), ctx = cvs.getContext('2d');
        const ts = 25; // Tile size
        cancelAnimationFrame(islandLoop);
        function loop() {
            ctx.clearRect(0,0,300,300);
            currentIsland.forEach(t => {
                ctx.fillStyle = TERRAIN[t.type].color;
                ctx.fillRect(t.x * ts, t.y * ts, ts, ts);
                
                // Concentric Mountain Rings & Blending
                if(t.type === 'PEAK' || t.type === 'MOUNTAIN') {
                    ctx.strokeStyle = "rgba(0,0,0,0.1)";
                    ctx.strokeRect(t.x * ts + 4, t.y * ts + 4, ts - 8, ts - 8);
                }
            });

            islandWalkers.forEach(m => {
                m.lx += m.vx; m.ly += m.vy;
                if(m.lx < 2 || m.lx > 22) m.vx *= -1;
                if(m.ly < 2 || m.ly > 22) m.vy *= -1;
                ctx.fillStyle = m.isSleep ? "#fff" : m.color;
                ctx.fillRect(m.tx*ts+m.lx, m.ty*ts+m.ly, 2, 2);
            });
            islandLoop = requestAnimationFrame(loop);
        }
        loop();
    }

    document.getElementById('island-canvas').onclick = (e) => {
        const r = e.target.getBoundingClientRect();
        const tx = Math.floor((e.clientX - r.left) / (r.width / 12));
        const ty = Math.floor((e.clientY - r.top) / (r.height / 12));
        const tile = currentIsland.find(t => t.x === tx && t.y === ty);
        if(tile) openTileDetail(tile);
    };

    function openTileDetail(tile) {
        document.getElementById('tile-panel').classList.remove('hidden');
        document.getElementById('tile-terrain-label').innerText = `${tile.type} ELEVATION: ${Math.floor(tile.elev)}`;
        document.getElementById('tile-mon-list').innerText = (tile.mons && tile.mons.length) ? tile.mons.map(m => m.name).join(', ') : 'NO LIFE DETECTED';
        const dctx = document.getElementById('tile-detail-canvas').getContext('2d');
        detailWalkers = []; cancelAnimationFrame(detailLoop);
        
        if(tile.mons) {
            tile.mons.forEach(m => {
                const s = mons.find(x => x.id === m.id);
                detailWalkers.push({ x: Math.random()*140+30, y: Math.random()*140+30, vx: m.vx*5, vy: m.vy*5, s, frame: 0, last: 0, anim: m.isSleep ? 'Sleep' : 'Walk' });
            });
        }

        function loop(t) {
            dctx.fillStyle = TERRAIN[tile.type].color; dctx.fillRect(0,0,200,200);
            // Draw a second ring for mountain depth in detail view
            if(tile.type === 'MOUNTAIN' || tile.type === 'PEAK') {
                dctx.fillStyle = "rgba(0,0,0,0.1)"; dctx.fillRect(20, 20, 160, 160);
            }
            detailWalkers.forEach(dw => {
                dw.x += dw.vx; dw.y += dw.vy;
                if(dw.x < 10 || dw.x > 180) dw.vx *= -1; if(dw.y < 10 || dw.y > 180) dw.vy *= -1;
                const asset = dw.s.assets[dw.anim+'-Anim'];
                if(asset) {
                    const img = new Image(); img.src = asset;
                    dctx.drawImage(img, dw.frame*32, (dw.vx>0?1:5)*32, 32, 32, dw.x-16, dw.y-16, 32, 32);
                    if(t - dw.last > 120) { dw.frame = (dw.frame+1)%4; dw.last = t; }
                } else { dctx.fillStyle = dw.anim === 'Sleep' ? '#fff' : 'cyan'; dctx.fillRect(dw.x, dw.y, 8, 8); }
            });
            detailLoop = requestAnimationFrame(loop);
        }
        loop(0);
    }

    function renderGrid() {
        const container = document.getElementById('mon-grid');
        const query = document.getElementById('search').value.toLowerCase();
        container.innerHTML = '';
        mons.filter(m => m.name.toLowerCase().includes(query) && (!activeHabitatFilter || m.habitat === activeHabitatFilter))
        .forEach(m => {
            const div = document.createElement('div'); div.className = 'mon-card';
            div.onclick = () => openMon(m.id);
            div.innerHTML = `<div style="width:48px; height:48px; background:#000; border:1px solid #333;"></div><div class="name">${m.name}</div><div style="font-size:0.6rem; color:#666">${m.habitat}</div>`;
            container.appendChild(div);
        });
    }

    function openMon(id) {
        currentMonId = id; const m = mons.find(x => x.id === id);
        showView('detail');
        document.getElementById('edit-name').value = m.name;
        renderHabitatSelect();
        updateUploadCheckmarks();
    }

    function updateMon(k, v) { const i = mons.findIndex(m=>m.id===currentMonId); mons[i][k] = v; save(); }
    function deleteMon() { if(confirm('DELETE?')) { mons = mons.filter(m=>m.id!==currentMonId); save(); showView('grid'); } }
    function addNewMon() {
        const id = Date.now();
        mons.push({ id, name: 'NEW_RECORD', habitat: 'Forest Floor', assets: {} });
        save(); openMon(id);
    }
    function save() { localStorage.setItem('island_mons_v12', JSON.stringify(mons)); }

    function showView(v) {
        document.getElementById('grid-view').classList.add('hidden');
        document.getElementById('island-view').classList.remove('active');
        document.getElementById('detail-view').style.display = 'none';
        if(v === 'grid') { document.getElementById('grid-view').classList.remove('hidden'); renderGrid(); }
        if(v === 'island') { document.getElementById('island-view').classList.add('active'); initIslandGen(); }
        if(v === 'detail') document.getElementById('detail-view').style.display = 'block';
    }

    function renderHabitatFilters() {
        document.getElementById('habitat-filters').innerHTML = HABITATS.map(h => `<div class="filter-chip ${activeHabitatFilter===h?'active':''}" onclick="activeHabitatFilter=(activeHabitatFilter==='${h}'?null:'${h}');renderHabitatFilters();renderGrid();">${h}</div>`).join('');
    }

    function renderHabitatSelect() {
        const m = mons.find(x => x.id === currentMonId);
        document.getElementById('habitat-select').innerHTML = HABITATS.map(h => `<div class="filter-chip ${m.habitat===h?'active':''}" onclick="updateMon('habitat','${h}');renderHabitatSelect();">${h}</div>`).join('');
    }

    function setupUploadZones() {
        document.getElementById('upload-zones').innerHTML = ['Walk','Sleep','Attack'].map(a => `<div class="upload-zone" id="z-${a}" onclick="doUpload('${a}')"><span>${a}-ANIM</span><span class="chk"></span></div>`).join('');
    }

    function doUpload(key) {
        const inp = document.getElementById('single-file-input');
        inp.onchange = (e) => {
            const r = new FileReader(); r.onload = (ev) => {
                mons.find(m=>m.id===currentMonId).assets[key+'-Anim'] = ev.target.result;
                save(); updateUploadCheckmarks();
            }; r.readAsDataURL(e.target.files[0]);
        }; inp.click();
    }

    function updateUploadCheckmarks() {
        const m = mons.find(x => x.id === currentMonId); if(!m) return;
        ['Walk','Sleep','Attack'].forEach(a => {
            const has = !!m.assets[a+'-Anim'];
            const el = document.getElementById(`z-${a}`);
            if(el) {
                el.classList.toggle('loaded', has);
                el.querySelector('.chk').innerText = has ? '✓' : '';
            }
        });
    }

    function renderTabs() {
        document.getElementById('preview-tabs').innerHTML = ['Walk','Sleep','Attack'].map(a => `<div class="tab ${activeTab===a?'active':''}" onclick="activeTab='${a}';renderTabs();">${a}</div>`).join('');
    }

    init();
</script>
</body>
</html>

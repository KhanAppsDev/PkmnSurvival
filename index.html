<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Island Mon Registry</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0b;
            --surface: #141417;
            --accent-cyan: #00f2ff;
            --accent-green: #39ff14;
            --accent-amber: #ffb100;
            --accent-red: #ff3e3e;
            --text: #e0e0e0;
            --border: #2a2a2e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            margin: 0; padding: 0; width: 100vw; overflow-x: hidden;
        }

        /* Scanline Overlay */
        body::before {
            content: " "; display: block; position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9999; background-size: 100% 3px, 2px 100%; pointer-events: none;
        }

        header {
            padding: 10px 15px; border-bottom: 1px solid var(--accent-cyan);
            background: var(--surface); position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
        }

        .btn {
            background: transparent; border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan); padding: 6px 12px; cursor: pointer;
            font-family: inherit; font-size: 0.75rem; text-transform: uppercase;
        }

        #grid-view { padding: 15px; }
        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .search-bar {
            background: #000; border: 1px solid var(--border); color: var(--accent-green);
            padding: 12px; width: 100%; font-family: inherit; font-size: 1rem;
        }
        .filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
        .mon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 15px; }

        .mon-card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 12px; position: relative; display: flex; flex-direction: column; align-items: center;
        }
        .mon-card .name { font-size: 1rem; color: var(--accent-cyan); margin: 8px 0; }
        .status-light {
            width: 8px; height: 8px; border-radius: 50%; position: absolute; top: 8px; right: 8px;
            background: #333;
        }
        .status-light.complete { background: var(--accent-green); box-shadow: 0 0 5px var(--accent-green); }

        .card-previews {
            display: flex; gap: 6px; margin-top: 10px; padding-top: 10px;
            border-top: 1px solid var(--border); width: 100%; justify-content: center;
        }
        .mini-preview { 
            width: 48px; height: 48px; background: #000; image-rendering: pixelated; 
            border: 1px solid #222; display: block;
        }
        .prev-label { font-size: 0.5rem; color: #666; text-align: center; margin-top: 2px; }

        #detail-view { display: none; padding: 15px; padding-bottom: 50px; }
        .editor-section { background: var(--surface); padding: 15px; border: 1px solid var(--border); margin-bottom: 20px; }
        h3 { margin: 0 0 12px 0; font-size: 0.85rem; color: var(--accent-cyan); border-bottom: 1px solid var(--border); }
        
        .field-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; color: #888; margin-bottom: 4px; }
        input[type="text"], textarea {
            width: 100%; background: #000; border: 1px solid var(--border); color: #fff; 
            padding: 10px; font-family: inherit; font-size: 0.9rem;
        }

        .behavior-selector { display: flex; gap: 4px; }
        .behavior-btn {
            flex: 1; padding: 10px 0; border: 1px solid var(--border); text-align: center; font-size: 0.7rem; opacity: 0.4;
        }
        .behavior-btn.active { opacity: 1; border-color: currentColor; }
        .behavior-btn[data-val="Docile"] { color: var(--accent-green); }
        .behavior-btn[data-val="Curious"] { color: var(--accent-amber); }
        .behavior-btn[data-val="Aggressive"] { color: var(--accent-red); }

        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .upload-zone {
            background: #000; border: 1px dashed var(--border); padding: 10px; font-size: 0.65rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .upload-zone.loaded { border-color: var(--accent-green); color: var(--accent-green); }

        .tabs { display: flex; overflow-x: auto; gap: 6px; margin-bottom: 12px; padding-bottom: 4px; }
        .tab { padding: 8px 14px; background: #000; border: 1px solid var(--border); font-size: 0.75rem; white-space: nowrap; }
        .tab.active { border-color: var(--accent-cyan); color: var(--accent-cyan); }
        
        #canvas-container {
            background: #111; border: 1px solid var(--border); display: flex; 
            justify-content: center; align-items: center; width: 100%; 
            aspect-ratio: 1/1; position: relative; overflow: hidden;
        }
        canvas { image-rendering: pixelated; }

        .dir-controls { margin-top: 15px; display: flex; justify-content: space-between; align-items: center; }
        .filter-chip { padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px; font-size: 0.75rem; white-space: nowrap;}
        .filter-chip.active { border-color: var(--accent-cyan); background: rgba(0, 242, 255, 0.1); }

        .move-row { display: flex; gap: 5px; margin-bottom: 5px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div style="color: var(--accent-cyan); font-weight: bold; font-size: 0.9rem;">MON_REGISTRY_V1</div>
    <div style="display: flex; gap: 8px;">
        <button class="btn" onclick="exportData()">Export</button>
        <button class="btn" onclick="addNewMon()" style="border-color: var(--accent-green); color: var(--accent-green);">+ Add</button>
    </div>
</header>

<div id="grid-view">
    <div class="controls">
        <input type="text" id="search" class="search-bar" placeholder="SEARCH_BY_NAME..." oninput="renderGrid()">
        <div id="biome-filters" class="filter-row"></div>
    </div>
    <div class="mon-grid" id="mon-grid"></div>
</div>

<div id="detail-view">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <button class="btn" onclick="showGrid()">&lt; REGISTRY</button>
        <button class="btn" onclick="deleteCurrentMon()" style="border-color: var(--accent-red); color: var(--accent-red);">DELETE</button>
    </div>

    <div class="editor-section">
        <h3>CORE_DATA</h3>
        <div class="field-group">
            <label>NAME</label>
            <input type="text" id="edit-name" onchange="updateCurrentMon('name', this.value)">
        </div>
        <div class="field-group">
            <label>BEHAVIOR</label>
            <div class="behavior-selector">
                <div class="behavior-btn" data-val="Docile" onclick="setBehavior('Docile')">DOCILE</div>
                <div class="behavior-btn" data-val="Curious" onclick="setBehavior('Curious')">CURIOUS</div>
                <div class="behavior-btn" data-val="Aggressive" onclick="setBehavior('Aggressive')">AGGRESSIVE</div>
            </div>
        </div>
        <div class="field-group">
            <label>BIOMES</label>
            <div id="biome-select" class="filter-row"></div>
        </div>
        <div class="field-group">
            <label>MOVES</label>
            <div id="moves-list"></div>
            <button class="btn" onclick="addMove()" style="margin-top:8px; width:100%">+ ADD MOVE</button>
        </div>
        <h3>FILES</h3>
        <div class="upload-grid" id="upload-zones"></div>
        <input type="file" id="file-input" class="hidden" accept=".png,.xml">
    </div>

    <div class="editor-section">
        <h3>ANIM_PREVIEW</h3>
        <div class="tabs" id="preview-tabs"></div>
        <div id="canvas-container">
            <canvas id="sprite-canvas"></canvas>
            <div id="portrait-view" class="hidden" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:2px; width:100%;"></div>
        </div>
        <div class="dir-controls" id="anim-controls">
            <button class="btn" onclick="changeDir(-1)">◀</button>
            <div id="dir-label" style="font-size:0.75rem; color:var(--accent-cyan)">Down-Right</div>
            <button class="btn" onclick="changeDir(1)">▶</button>
        </div>
    </div>
</div>

<script>
    const BIOMES = ['Forest Floor', 'Canopy', 'Cave', 'Riverbank', 'Mountain'];
    const ANIMS = ['Walk', 'Hop', 'Idle', 'Sleep', 'Hurt', 'Attack', 'Charge', 'Shoot', 'Strike'];
    const DIRS = ['Down-Right', 'Right', 'Up-Right', 'Up', 'Up-Left', 'Left', 'Down-Left', 'Down'];
    
    let mons = JSON.parse(localStorage.getItem('island_mons_v4') || '[]');
    let currentMonId = null;
    let activeTab = 'Portrait';
    let currentDir = 0;
    let globalDirRow = 0;
    let gridAnims = [];
    let lastRotationTime = 0;

    const canvas = document.getElementById('sprite-canvas');
    const ctx = canvas.getContext('2d');
    let detailLoop = null;

    function init() {
        renderBiomeFilters();
        renderGrid();
        setupUploadZones();
        renderTabs();
        requestAnimationFrame(runGlobalLoop);
    }

    function getAnimData(xmlString, animName) {
        if (!xmlString) return null;
        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlString, "text/xml");
        const anims = Array.from(xml.getElementsByTagName('Anim'));
        let target = anims.find(a => a.querySelector('Name').textContent === animName);
        if (!target) return null;
        const copyOf = target.querySelector('CopyOf');
        if (copyOf) target = anims.find(a => a.querySelector('Name').textContent === copyOf.textContent);
        if (!target) return null;

        return {
            fw: parseInt(target.querySelector('FrameWidth').textContent),
            fh: parseInt(target.querySelector('FrameHeight').textContent),
            durs: Array.from(target.getElementsByTagName('Duration')).map(d => parseInt(d.textContent))
        };
    }

    function renderGrid() {
        const grid = document.getElementById('mon-grid');
        const search = document.getElementById('search').value.toLowerCase();
        grid.innerHTML = ''; gridAnims = [];

        mons.filter(m => {
            const matchS = m.name.toLowerCase().includes(search);
            const matchB = biomeFilter.length === 0 || biomeFilter.every(b => m.biomes.includes(b));
            return matchS && matchB;
        }).forEach(mon => {
            const card = document.createElement('div');
            card.className = 'mon-card';
            card.onclick = () => openDetail(mon.id);
            const complete = mon.name && mon.assets.Portrait && mon.assets['Walk-Anim'] && mon.xmlData;

            card.innerHTML = `
                <span class="status-light ${complete ? 'complete' : ''}"></span>
                <img src="${mon.assets.Portrait || ''}" style="width:40px; height:40px; object-fit:none; border:1px solid #333;">
                <div class="name">${mon.name || 'NEW_MON'}</div>
                <div class="card-previews">
                    ${['Walk','Hop','Attack'].map(t => `
                        <div style="text-align:center">
                            <canvas id="prev-${t}-${mon.id}" class="mini-preview"></canvas>
                            <div class="prev-label">${t}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            grid.appendChild(card);

            ['Walk','Hop','Attack'].forEach(type => {
                const key = type + '-Anim';
                if (mon.assets[key] && mon.xmlData) {
                    const img = new Image(); img.src = mon.assets[key];
                    gridAnims.push({ canvas: document.getElementById(`prev-${type}-${mon.id}`), mon, type, img, frame: 0, last: 0 });
                }
            });
        });
    }

    function runGlobalLoop(now) {
        // Handle Automatic Rotation (Spin) every 1.5 seconds
        if (now - lastRotationTime > 1500) {
            globalDirRow = (globalDirRow + 1) % 8;
            lastRotationTime = now;
        }

        gridAnims.forEach(a => {
            const data = getAnimData(a.mon.xmlData, a.type);
            if (!data) return;

            if (now - a.last >= data.durs[a.frame] * 16) {
                a.frame = (a.frame + 1) % data.durs.length; a.last = now;
            }

            const c = a.canvas; c.width = 48; c.height = 48;
            const cx = c.getContext('2d');
            cx.imageSmoothingEnabled = false; cx.clearRect(0,0,48,48);

            // Scale logic: Ensure same scale by fitting to the box while maintaining center
            const scale = Math.min(c.width / data.fw, c.height / data.fh);
            const drawW = data.fw * scale;
            const drawH = data.fh * scale;
            const offsetX = (c.width - drawW) / 2;
            const offsetY = (c.height - drawH) / 2;

            cx.drawImage(
                a.img, 
                a.frame * data.fw, globalDirRow * data.fh, data.fw, data.fh, 
                offsetX, offsetY, drawW, drawH
            );
        });
        requestAnimationFrame(runGlobalLoop);
    }

    function openDetail(id) {
        currentMonId = id; const mon = mons.find(m => m.id === id);
        document.getElementById('grid-view').classList.add('hidden');
        document.getElementById('detail-view').style.display = 'block';
        document.getElementById('edit-name').value = mon.name;
        setBehavior(mon.behavior); renderBiomeSelectors(); renderMoves();
        updateUploadCheckmarks(); setPreviewTab('Portrait'); window.scrollTo(0,0);
    }

    function showGrid() {
        cancelAnimationFrame(detailLoop);
        document.getElementById('detail-view').style.display = 'none';
        document.getElementById('grid-view').classList.remove('hidden');
        renderGrid();
    }

    function setPreviewTab(tab) {
        activeTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.name === tab));
        const pv = document.getElementById('portrait-view');
        const ac = document.getElementById('anim-controls');

        if (tab === 'Portrait') {
            canvas.classList.add('hidden'); pv.classList.remove('hidden'); ac.classList.add('hidden');
            renderPortrait();
        } else {
            canvas.classList.remove('hidden'); pv.classList.add('hidden'); ac.classList.remove('hidden');
            startDetailAnim();
        }
    }

    function startDetailAnim() {
        const mon = mons.find(m => m.id === currentMonId);
        cancelAnimationFrame(detailLoop);
        const data = getAnimData(mon.xmlData, activeTab);
        if (!data || !mon.assets[activeTab + '-Anim']) return;

        const img = new Image(); img.src = mon.assets[activeTab + '-Anim'];
        img.onload = () => {
            // Keep preview box consistent
            const displaySize = 160;
            canvas.width = displaySize; canvas.height = displaySize;
            let frame = 0; let last = performance.now();
            function loop(now) {
                if (now - last >= data.durs[frame] * 16) { frame = (frame + 1) % data.durs.length; last = now; }
                ctx.imageSmoothingEnabled = false; ctx.clearRect(0,0,canvas.width,canvas.height);
                
                const scale = Math.min(canvas.width / data.fw, canvas.height / data.fh);
                const dw = data.fw * scale; const dh = data.fh * scale;
                const ox = (canvas.width - dw) / 2; const oy = (canvas.height - dh) / 2;

                ctx.drawImage(img, frame * data.fw, currentDir * data.fh, data.fw, data.fh, ox, oy, dw, dh);
                detailLoop = requestAnimationFrame(loop);
            }
            detailLoop = requestAnimationFrame(loop);
        };
    }

    function renderPortrait() {
        const mon = mons.find(m => m.id === currentMonId);
        const view = document.getElementById('portrait-view'); view.innerHTML = '';
        if (!mon.assets.Portrait) return;
        for (let i = 0; i < 16; i++) {
            const f = document.createElement('div');
            f.style.aspectRatio = '1/1'; f.style.background = `url(${mon.assets.Portrait})`;
            f.style.backgroundSize = '400% 400%'; f.style.imageRendering = 'pixelated';
            f.style.backgroundPosition = `${(i % 4) * 33.3}% ${Math.floor(i / 4) * 33.3}%`;
            f.style.border = '1px solid #222'; view.appendChild(f);
        }
    }

    function setupUploadZones() {
        const zones = ['Portrait', ...ANIMS.map(a => a + '-Anim'), 'AnimData.xml'];
        document.getElementById('upload-zones').innerHTML = zones.map(z => `
            <div class="upload-zone" id="z-${z}" onclick="triggerUpload('${z}')">
                <span>${z.replace('-Anim','')}</span><span class="chk"></span>
            </div>
        `).join('');
    }

    function triggerUpload(z) {
        const input = document.getElementById('file-input');
        input.onchange = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const r = new FileReader();
            r.onload = (ev) => {
                const mon = mons.find(m => m.id === currentMonId);
                if (z === 'AnimData.xml') mon.xmlData = ev.target.result;
                else mon.assets[z] = ev.target.result;
                save(); updateUploadCheckmarks(); setPreviewTab(activeTab);
            };
            z === 'AnimData.xml' ? r.readAsText(file) : r.readAsDataURL(file);
        };
        input.click();
    }

    function updateUploadCheckmarks() {
        const mon = mons.find(m => m.id === currentMonId);
        document.querySelectorAll('.upload-zone').forEach(z => {
            const key = z.id.replace('z-', '');
            const has = key === 'AnimData.xml' ? !!mon.xmlData : !!mon.assets[key];
            z.classList.toggle('loaded', has); z.querySelector('.chk').innerText = has ? '✓' : '';
        });
    }

    function addNewMon() {
        const id = Date.now().toString();
        mons.push({ id, name: 'NEW_MON', behavior: 'Docile', biomes: [], moves: ['Tackle'], notes: '', assets: {}, xmlData: null });
        save(); openDetail(id);
    }

    function save() { localStorage.setItem('island_mons_v4', JSON.stringify(mons)); }
    function updateCurrentMon(k, v) { const idx = mons.findIndex(m => m.id === currentMonId); mons[idx][k] = v; save(); }
    function setBehavior(v) { updateCurrentMon('behavior', v); document.querySelectorAll('.behavior-btn').forEach(b => b.classList.toggle('active', b.dataset.val === v)); }
    function changeDir(d) { currentDir = (currentDir + d + 8) % 8; document.getElementById('dir-label').innerText = DIRS[currentDir]; }
    function deleteCurrentMon() { if(confirm('DELETE?')) { mons = mons.filter(m => m.id !== currentMonId); save(); showGrid(); } }

    function renderTabs() {
        document.getElementById('preview-tabs').innerHTML = ['Portrait', ...ANIMS].map(t => `
            <div class="tab" data-name="${t}" onclick="setPreviewTab('${t}')">${t}</div>
        `).join('');
    }

    function renderBiomeFilters() {
        document.getElementById('biome-filters').innerHTML = BIOMES.map(b => `<div class="filter-chip" onclick="toggleFilter(this, '${b}')">${b}</div>`).join('');
    }

    let biomeFilter = [];
    function toggleFilter(el, b) {
        el.classList.toggle('active'); biomeFilter = biomeFilter.includes(b) ? biomeFilter.filter(x => x !== b) : [...biomeFilter, b]; renderGrid();
    }

    function renderBiomeSelectors() {
        const mon = mons.find(m => m.id === currentMonId);
        document.getElementById('biome-select').innerHTML = BIOMES.map(b => `
            <div class="filter-chip ${mon?.biomes.includes(b) ? 'active' : ''}" onclick="toggleBiome('${b}')">${b}</div>
        `).join('');
    }

    function toggleBiome(b) {
        const mon = mons.find(m => m.id === currentMonId);
        mon.biomes = mon.biomes.includes(b) ? mon.biomes.filter(x => x !== b) : [...mon.biomes, b];
        save(); renderBiomeSelectors();
    }

    function renderMoves() {
        const mon = mons.find(m => m.id === currentMonId);
        document.getElementById('moves-list').innerHTML = mon.moves.map((m, i) => `
            <div class="move-row"><input type="text" value="${m}" onchange="updateMove(${i}, this.value)"><button class="btn" onclick="removeMove(${i})" style="color:var(--accent-red)">X</button></div>
        `).join('');
    }

    function addMove() { const m = mons.find(x => x.id === currentMonId); m.moves.push(''); save(); renderMoves(); }
    function updateMove(i, v) { const m = mons.find(x => x.id === currentMonId); m.moves[i] = v; save(); }
    function removeMove(i) { const m = mons.find(x => x.id === currentMonId); m.moves.splice(i, 1); save(); renderMoves(); }

    function exportData() {
        const clean = mons.map(({assets, xmlData, ...rest}) => ({...rest, hasAssets: Object.keys(assets)}));
        const blob = new Blob([JSON.stringify(clean, null, 2)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'mons.json'; a.click();
    }

    init();
</script>
</body>
</html>

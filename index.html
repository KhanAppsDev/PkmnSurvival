<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Island Mon Registry v2.1.0</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: #111;
  color: #ddd;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
  font-size: 14px;
  line-height: 1.5;
  color-scheme: dark;
  -webkit-text-size-adjust: 100%;
}
button, input, select, textarea {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
  -webkit-tap-highlight-color: rgba(0,200,150,0.2);
  touch-action: manipulation;
}
button { cursor: pointer; }
input, select, textarea {
  background: #1a1a1a;
  border: 1px solid #333;
  color: #ddd;
  border-radius: 4px;
  padding: 10px;
  width: 100%;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: #0cb;
}
textarea { resize: vertical; min-height: 70px; }
.view { display: none; }
.view.active { display: block; }
.topbar {
  background: #181818;
  border-bottom: 1px solid #333;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.topbar h1 {
  font-size: 15px;
  font-weight: 600;
  color: #0cb;
  white-space: nowrap;
}
.topbar-btns { display: flex; gap: 6px; }
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 10px 14px;
  min-height: 44px;
  min-width: 44px;
  background: #222;
  border: 1px solid #444;
  color: #ccc;
  border-radius: 6px;
  font-size: 13px;
  white-space: nowrap;
}
.btn:active { background: #333; }
.btn-primary { background: #0a3; border-color: #0a3; color: #fff; }
.btn-primary:active { background: #072; }
.btn-danger { border-color: #c33; color: #f66; }
.btn-danger:active { background: #311; }
.btn-sm { padding: 6px 10px; min-height: 36px; font-size: 12px; }
.btn-block { width: 100%; }
.list-search {
  padding: 10px 14px;
  background: #181818;
  border-bottom: 1px solid #282828;
}
.mon-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px;
  border-bottom: 1px solid #222;
  cursor: pointer;
}
.mon-item:active { background: #1a1a1a; }
.mon-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  background: #444;
}
.mon-dot.complete { background: #0a3; }
.mon-dot.partial { background: #da3; }
.mon-item-name { flex: 1; font-size: 15px; }
.mon-item-arrow { color: #555; font-size: 18px; }
.editor-back {
  padding: 10px 14px;
  background: #181818;
  border-bottom: 1px solid #333;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}
.editor-back-btn {
  background: none;
  border: none;
  color: #0cb;
  font-size: 15px;
  padding: 10px 4px;
  min-height: 44px;
}
.section {
  padding: 14px;
  border-bottom: 1px solid #222;
}
.section-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #888;
  margin-bottom: 10px;
}
.field-label {
  display: block;
  font-size: 12px;
  color: #888;
  margin-bottom: 4px;
  margin-top: 10px;
}
.field-label:first-child { margin-top: 0; }
.beh-group { display: flex; gap: 6px; margin-top: 6px; }
.beh-btn {
  flex: 1;
  padding: 10px 6px;
  background: #1a1a1a;
  border: 2px solid #333;
  border-radius: 6px;
  text-align: center;
  font-size: 12px;
  min-height: 44px;
  color: #ccc;
}
.beh-btn.selected { border-color: #0cb; color: #0cb; }
.beh-btn:active { background: #222; }
.biome-list { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
.biome-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 4px;
  min-height: 44px;
  cursor: pointer;
}
.biome-row:active { background: #222; }
.biome-row.checked { border-color: #0a3; }
.biome-check-box {
  width: 20px;
  height: 20px;
  border: 2px solid #555;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: transparent;
  flex-shrink: 0;
}
.biome-row.checked .biome-check-box { border-color: #0a3; color: #0a3; }
.move-row {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-bottom: 6px;
}
.move-row input { flex: 1; }
.sprite-list { display: flex; flex-direction: column; gap: 6px; }
.sprite-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 4px;
  min-height: 48px;
  cursor: pointer;
}
.sprite-row:active { background: #222; }
.sprite-row.uploaded { border-color: #0a3; }
.sprite-row.uploading { border-color: #da3; opacity: 0.7; }
.sprite-row.error { border-color: #c33; }
.sprite-icon { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
.sprite-name { flex: 1; font-size: 13px; }
.sprite-row input[type="file"] { display: none; }
.preview-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.preview-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
.preview-canvas {
  image-rendering: pixelated;
  border: 1px solid #333;
  border-radius: 4px;
}
.dir-label {
  min-width: 80px;
  text-align: center;
  font-size: 13px;
  color: #aaa;
}
.preview-msg {
  text-align: center;
  color: #666;
  padding: 20px;
  font-size: 13px;
}
.portrait-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin-top: 10px;
}
.portrait-grid canvas {
  image-rendering: pixelated;
  border: 1px solid #333;
  border-radius: 2px;
}
.modal-bg {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-bg.open { display: flex; }
.modal-box {
  background: #1a1a1a;
  border: 1px solid #444;
  border-radius: 8px;
  width: 100%;
  max-width: 420px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-head {
  padding: 14px 16px;
  border-bottom: 1px solid #333;
  font-weight: 600;
  color: #0cb;
}
.modal-body { padding: 16px; }
.modal-foot {
  padding: 12px 16px;
  border-top: 1px solid #333;
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
.toast-wrap {
  position: fixed;
  bottom: 16px;
  left: 16px;
  right: 16px;
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 6px;
  pointer-events: none;
}
.toast {
  padding: 10px 14px;
  background: #222;
  border: 1px solid #444;
  border-radius: 6px;
  font-size: 13px;
  animation: fadeIn 0.2s;
}
.toast.success { border-color: #0a3; }
.toast.error { border-color: #c33; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.app-footer {
  text-align: center;
  padding: 8px;
  font-size: 10px;
  color: #555;
}

/* ── DEBUG PANEL ── */
#debugPanel {
background: #1a0a0a;
border: 2px solid #f80;
border-radius: 6px;
margin: 10px;
padding: 10px;
font-size: 12px;
font-family: monospace;
max-height: 300px;
overflow-y: auto;
}
#debugPanel h3 {
color: #f80;
font-size: 13px;
margin-bottom: 8px;
}
.dbg-line {
padding: 2px 0;
border-bottom: 1px solid #2a1a1a;
}
.dbg-ok { color: #0a3; }
.dbg-err { color: #f44; }
.dbg-info { color: #aaa; }
.dbg-warn { color: #da3; }
#debugTapTest {
display: inline-block;
padding: 12px 20px;
background: #333;
border: 2px solid #f80;
color: #f80;
border-radius: 6px;
margin-top: 8px;
font-size: 14px;
font-family: monospace;
}
</style>

</head>
<body>

<!-- ============ DEBUG PANEL — REMOVE AFTER DIAGNOSIS ============ -->

<div id="debugPanel">
  <h3>DIAGNOSTIC v2.1.0</h3>
  <div id="debugLog"></div>
  <div id="debugTapTest" onclick="dbgTap()">TAP THIS TO TEST CLICKS</div>
</div>

<!-- ============ LIST VIEW ============ -->

<div class="view active" id="viewList">
  <div class="topbar">
    <h1>Island Mon Registry</h1>
    <div class="topbar-btns">
      <button class="btn btn-sm" onclick="openSettings()">Settings</button>
      <button class="btn btn-sm" onclick="exportJSON()">Export</button>
    </div>
  </div>
  <div class="list-search">
    <input type="text" id="searchInput" placeholder="Search mons..." oninput="renderList()">
  </div>
  <div id="monListContainer"></div>
  <div style="padding:14px;">
    <button class="btn btn-primary btn-block" onclick="addMon()">+ Add Mon</button>
    <div class="app-footer" id="monCount"></div>
  </div>
</div>

<!-- ============ EDITOR VIEW ============ -->

<div class="view" id="viewEditor">
  <div class="editor-back">
    <button class="editor-back-btn" onclick="goBack()">&#8592; Back</button>
    <button class="btn btn-sm btn-danger" onclick="deleteMon(selectedMonId)">Delete</button>
  </div>
  <div id="editorBody"></div>
  <div class="app-footer">v2.1.0</div>
</div>

<!-- ============ SETTINGS MODAL ============ -->

<div class="modal-bg" id="settingsModal">
  <div class="modal-box">
    <div class="modal-head">GitHub Settings</div>
    <div class="modal-body">
      <label class="field-label">Personal Access Token (repo scope)</label>
      <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx">
      <div id="tokenPreview" style="font-size:11px;color:#666;margin-top:4px;"></div>
      <label class="field-label">GitHub Username</label>
      <input type="text" id="ghUser" placeholder="your-username">
      <label class="field-label">Repository Name</label>
      <input type="text" id="ghRepo" placeholder="island-mon-game">
      <label class="field-label">Branch</label>
      <input type="text" id="ghBranch" placeholder="main" value="main">
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeSettings()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<!-- ============ TOASTS ============ -->

<div class="toast-wrap" id="toastWrap"></div>

<script>
/* ══════════════════════════════════════════
   DIAGNOSTIC LOGGING — runs first
   ══════════════════════════════════════════ */
var dbgTapCount = 0;
function dbg(msg, type) {
  var el = document.getElementById('debugLog');
  if (!el) return;
  var line = document.createElement('div');
  line.className = 'dbg-line dbg-' + (type || 'info');
  line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}
function dbgTap() {
  dbgTapCount++;
  dbg('TAP #' + dbgTapCount + ' registered OK', 'ok');
  document.getElementById('debugTapTest').textContent = 'TAPS: ' + dbgTapCount + ' (working!)';
}

// Catch ALL errors globally
window.onerror = function(msg, src, line, col, err) {
  dbg('ERROR: ' + msg + ' (line ' + line + ')', 'err');
  return false;
};
window.addEventListener('unhandledrejection', function(e) {
  dbg('PROMISE ERROR: ' + (e.reason ? e.reason.message || e.reason : 'unknown'), 'err');
});

dbg('Script tag started executing', 'ok');
dbg('UA: ' + navigator.userAgent.substring(0, 80), 'info');

/* ══════════════════════════════════════════
   Island Mon Registry v2.1.0
   ══════════════════════════════════════════ */

var SPRITE_FILES = [
  'Walk-Anim.png','Idle-Anim.png','Sleep-Anim.png','Hurt-Anim.png',
  'Attack-Anim.png','Charge-Anim.png','Shoot-Anim.png','Strike-Anim.png',
  'AnimData.xml'
];
var BIOMES = [
  {id:'forest_floor',label:'Forest Floor'},
  {id:'canopy',label:'Canopy'},
  {id:'cave',label:'Cave'},
  {id:'riverbank',label:'Riverbank'},
  {id:'mountain',label:'Mountain'}
];
var BEHAVIORS = [
  {id:'docile',label:'Docile',desc:'Walk up & pet'},
  {id:'curious',label:'Curious',desc:'Needs food/item'},
  {id:'aggressive',label:'Aggressive',desc:'Weaken in combat'}
];
var PMD_DIRS = ['South','SE','East','NE','North','NW','West','SW'];
var ANIM_TYPES = ['Walk','Idle','Sleep','Hurt','Attack','Charge','Shoot','Strike'];

var mons = [];
var selectedMonId = null;
var animState = null;

dbg('Constants defined OK', 'ok');

// ── Persistence ──
function load() {
  try { mons = JSON.parse(localStorage.getItem('imr_mons')) || []; } catch(e) { mons = []; }
}
function save() { localStorage.setItem('imr_mons', JSON.stringify(mons)); }
function ghLoad() {
  try { return JSON.parse(localStorage.getItem('imr_gh')) || {}; } catch(e) { return {}; }
}
function ghSave(s) { localStorage.setItem('imr_gh', JSON.stringify(s)); }

// ── Helpers ──
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function genId() { return 'mon_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5); }
function toFolder(name) { return name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9\-]/g, ''); }
function getMon(id) { return mons.find(function(m) { return m.id === id; }); }
function isComplete(m) {
  if (!m.name || !m.behavior || !m.biomes.length) return false;
  var hasMoves = m.moves.filter(function(x) { return x.trim(); }).length > 0;
  if (!hasMoves) return false;
  return SPRITE_FILES.every(function(f) { return m.sprites && m.sprites[f]; });
}
function isPartial(m) {
  if (!m.name) return false;
  return m.behavior || m.biomes.length || SPRITE_FILES.some(function(f) { return m.sprites && m.sprites[f]; });
}
function dotClass(m) { return isComplete(m) ? 'complete' : isPartial(m) ? 'partial' : ''; }

dbg('Functions defined OK', 'ok');

// ── Toast ──
function toast(msg, type) {
  var w = document.getElementById('toastWrap');
  var t = document.createElement('div');
  t.className = 'toast ' + (type || '');
  t.textContent = msg;
  w.appendChild(t);
  setTimeout(function() { t.remove(); }, 3000);
}

// ── Views ──
function showView(id) {
  dbg('showView(' + id + ')', 'info');
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function goBack() {
  stopAnim();
  selectedMonId = null;
  showView('viewList');
  renderList();
}

// ── List ──
function renderList() {
  dbg('renderList() called, mons: ' + mons.length, 'info');
  var q = document.getElementById('searchInput').value.toLowerCase().trim();
  var list = mons;
  if (q) list = list.filter(function(m) { return m.name.toLowerCase().indexOf(q) >= 0; });

  var c = document.getElementById('monListContainer');
  if (!list.length) {
    c.innerHTML = '<div style="padding:40px;text-align:center;color:#666;">No mons yet. Tap + Add Mon.</div>';
  } else {
    c.innerHTML = list.map(function(m) {
      return '<div class="mon-item" onclick="selectMon(\'' + m.id + '\')">' +
        '<span class="mon-dot ' + dotClass(m) + '"></span>' +
        '<span class="mon-item-name">' + esc(m.name || 'Unnamed') + '</span>' +
        '<span class="mon-item-arrow">&rsaquo;</span>' +
      '</div>';
    }).join('');
  }
  var total = mons.length;
  var comp = mons.filter(isComplete).length;
  document.getElementById('monCount').textContent = total + ' mons | ' + comp + ' complete | v2.1.0';
}

// ── Add / Select / Delete ──
function addMon() {
  dbg('addMon() called', 'ok');
  var m = { id: genId(), name: '', behavior: '', biomes: [], moves: [''], notes: '', sprites: {} };
  mons.push(m);
  save();
  selectMon(m.id);
}
function selectMon(id) {
  dbg('selectMon(' + id + ')', 'info');
  stopAnim();
  selectedMonId = id;
  showView('viewEditor');
  renderEditor();
}
function deleteMon(id) {
  if (!confirm('Delete this mon?')) return;
  mons = mons.filter(function(m) { return m.id !== id; });
  SPRITE_FILES.forEach(function(f) { try { localStorage.removeItem('asset_' + id + '_' + f); } catch(e) {} });
  save();
  goBack();
  toast('Deleted', 'error');
}

// ── Editor ──
function renderEditor() {
  var m = getMon(selectedMonId);
  if (!m) { dbg('renderEditor: mon not found!', 'err'); return; }
  dbg('renderEditor for: ' + (m.name || 'unnamed'), 'info');
  var h = '';

  h += '<div class="section">';
  h += '<div class="section-title">Identity</div>';
  h += '<label class="field-label">Name</label>';
  h += '<input type="text" id="ed_name" value="' + esc(m.name) + '" placeholder="e.g. Flamegecko" oninput="updField(\'name\',this.value)">';
  h += '</div>';

  h += '<div class="section">';
  h += '<div class="section-title">Behavior</div>';
  h += '<div class="beh-group">';
  BEHAVIORS.forEach(function(b) {
    var sel = m.behavior === b.id ? ' selected' : '';
    h += '<button class="beh-btn' + sel + '" onclick="updField(\'behavior\',\'' + b.id + '\')">' + b.label + '<br><small style="color:#888">' + b.desc + '</small></button>';
  });
  h += '</div></div>';

  h += '<div class="section">';
  h += '<div class="section-title">Biomes</div>';
  h += '<div class="biome-list">';
  BIOMES.forEach(function(b) {
    var chk = m.biomes.indexOf(b.id) >= 0;
    h += '<div class="biome-row' + (chk ? ' checked' : '') + '" onclick="toggleBiome(\'' + b.id + '\')">';
    h += '<span class="biome-check-box">' + (chk ? '&#10003;' : '') + '</span>';
    h += '<span>' + b.label + '</span>';
    h += '</div>';
  });
  h += '</div></div>';

  h += '<div class="section">';
  h += '<div class="section-title">Moves</div>';
  m.moves.forEach(function(mv, i) {
    h += '<div class="move-row">';
    h += '<input type="text" value="' + esc(mv) + '" placeholder="Move ' + (i + 1) + '..." oninput="updMove(' + i + ',this.value)">';
    h += '<button class="btn btn-sm btn-danger" onclick="rmMove(' + i + ')">X</button>';
    h += '</div>';
  });
  h += '<button class="btn btn-sm" onclick="addMove()" style="margin-top:4px;">+ Add Move</button>';
  h += '</div>';

  h += '<div class="section">';
  h += '<div class="section-title">Notes</div>';
  h += '<textarea placeholder="Lore, spawn conditions..." oninput="updField(\'notes\',this.value)">' + esc(m.notes) + '</textarea>';

h += ‘</div>’;

h += ‘<div class="section">’;
h += ‘<div class="section-title">Sprites (tap to upload)</div>’;
h += ‘<div class="sprite-list">’;
SPRITE_FILES.forEach(function(f) {
var up = m.sprites && m.sprites[f];
var cls = up ? ’ uploaded’ : ‘’;
var sid = ‘sp_’ + f.replace(/./g, ‘_’);
h += ‘<div class="sprite-row' + cls + '" id="' + sid + '" onclick="pickFile(\'' + esc(f) + '\')">’;
h += ‘<span class="sprite-icon">’ + (up ? ‘✓’ : ‘↑’) + ‘</span>’;
h += ‘<span class="sprite-name">’ + esc(f) + ‘</span>’;
h += ‘<input type="file" accept="' + (f.endsWith('.xml') ? '.xml' : '.png') + '" onchange="uploadSprite(\'' + esc(f) + '\',this)">’;
h += ‘</div>’;
});
h += ‘</div></div>’;

h += ‘<div class="section">’;
h += ‘<div class="section-title">Animation Preview</div>’;
var hasWalk = getAsset(m.id, ‘Walk-Anim.png’);
var hasXml = getAsset(m.id, ‘AnimData.xml’);
if (hasWalk && hasXml) {
h += ‘<div class="preview-wrap">’;
h += ‘<div class="preview-controls">’;
h += ‘<select id="animSel" onchange="restartAnim()" style="width:auto;padding:8px;">’;
ANIM_TYPES.forEach(function(a) {
h += ‘<option value="' + a + '">’ + a + ‘</option>’;
});
h += ‘</select>’;
h += ‘<button class="btn btn-sm" onclick="chgDir(-1)"><</button>’;
h += ‘<span class="dir-label" id="dirLabel">South</span>’;
h += ‘<button class="btn btn-sm" onclick="chgDir(1)">></button>’;
h += ‘</div>’;
h += ‘<canvas id="prevCanvas" class="preview-canvas"></canvas>’;
h += ‘</div>’;
} else {
h += ‘<div class="preview-msg">Upload Walk-Anim.png + AnimData.xml to preview</div>’;
}
h += ‘</div>’;

h += ‘<div class="section">’;
h += ‘<div class="section-title">Portrait Preview</div>’;
h += ‘<div style="text-align:center;">’;
h += ‘<button class="btn btn-sm" onclick="document.getElementById(\'portraitIn\').click()">Upload Portrait Sheet</button>’;
h += ‘<input type="file" id="portraitIn" accept=".png" style="display:none" onchange="loadPortrait(this)">’;
h += ‘<div class="portrait-grid" id="portraitGrid"></div>’;
h += ‘</div></div>’;

document.getElementById(‘editorBody’).innerHTML = h;

if (hasWalk && hasXml) {

}
if (!animNode) animNode = xml.querySelector(‘Anim’);

var fh = parseInt(fhEl.textContent);

} else {
durations = [8, 8, 8, 8];
}

var scale = 3;
canvas.width = fw * scale;
canvas.height = fh * scale;
ctx.imageSmoothingEnabled = false;

var img = new Image();
img.src = ‘data:image/png;base64,’ + spriteB64;
img.onload = function() {
var totalFrames = durations.length || Math.floor(img.width / fw);
var curFrame = 0;
var tick = 0;
var dir = (animState && typeof animState.direction === ‘number’) ? animState.direction : 0;

```
animState = { timer: null, direction: dir, img: img, fw: fw, fh: fh, scale: scale, ctx: ctx, canvas: canvas };

function draw() {
  var d = animState.direction;
  var c = animState.ctx;
  var cv = animState.canvas;
  var s = animState.scale;
  c.clearRect(0, 0, cv.width, cv.height);
  var ts = 8 * s;

      c.fillStyle = ((x / ts + y / ts) % 2 === 0) ? '#1a1a2e' : '#16162a';
      c.fillRect(x, y, ts, ts);

}

animState.timer = setInterval(function() {
  tick++;
  var dur = durations[curFrame % durations.length] || 8;

  draw();
}, 16);

draw();
updDir();

// ── Portrait ──
function loadPortrait(input) {
if (!input.files || !input.files[0]) return;
var reader = new FileReader();
reader.onload = function(e) {
var img = new Image();
img.onload = function() {
var fs = 40, cols = Math.floor(img.width / fs), rows = Math.floor(img.height / fs);
var max = Math.min(cols * rows, 12), grid = document.getElementById(‘portraitGrid’);
if (!grid) return;
grid.innerHTML = ‘’;
var sc = 3;
for (var i = 0; i < max; i++) {
var col = i % cols, row = Math.floor(i / cols);
var c = document.createElement(‘canvas’);
c.width = fs * sc; c.height = fs * sc;
var cx = c.getContext(‘2d’);
cx.imageSmoothingEnabled = false;
cx.drawImage(img, col * fs, row * fs, fs, fs, 0, 0, fs * sc, fs * sc);
grid.appendChild(c);
}
};
img.src = e.target.result;
};
reader.readAsDataURL(input.files[0]);
}

// ── Export ──
function exportJSON() {
var data = mons.map(function(m) {
return {
name: m.name, behavior: m.behavior, biomes: m.biomes,
moves: m.moves.filter(function(x) { return x.trim(); }),
notes: m.notes,
spriteFolder: m.name ? ‘resources/pokemon/’ + toFolder(m.name) + ‘/sprites/’ : null,
assets: SPRITE_FILES.reduce(function(o, f) { o[f] = !!(m.sprites && m.sprites[f]); return o; }, {})
};
});
var blob = new Blob([JSON.stringify(data, null, 2)], { type: ‘application/json’ });
var a = document.createElement(‘a’);
a.href = URL.createObjectURL(blob);
a.download = ‘mons.json’;
a.click();
URL.revokeObjectURL(a.href);
toast(‘Exported ’ + data.length + ’ mons’, ‘success’);
}

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Island Mon Registry</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#111;color:#ddd;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:14px;line-height:1.5;color-scheme:dark;-webkit-text-size-adjust:100%}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;touch-action:manipulation;-webkit-appearance:none;appearance:none}
button{cursor:pointer}
input,select,textarea{background:#1a1a1a;border:1px solid #333;color:#ddd;border-radius:4px;padding:10px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:#0cb}
textarea{resize:vertical;min-height:70px}
.hide{display:none}
.topbar{background:#181818;border-bottom:1px solid #333;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;position:sticky;top:0;z-index:10}
.topbar h1{font-size:15px;font-weight:600;color:#0cb;white-space:nowrap}
.tbb{display:flex;gap:6px}
.b{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:10px 14px;min-height:44px;min-width:44px;background:#222;border:1px solid #444;color:#ccc;border-radius:6px;font-size:13px;white-space:nowrap}
.b:active{background:#333}
.bp{background:#0a3;border-color:#0a3;color:#fff}
.bp:active{background:#072}
.bd{border-color:#c33;color:#f66}
.bd:active{background:#311}
.bs{padding:6px 10px;min-height:36px;font-size:12px}
.bw{width:100%}
.ls{padding:10px 14px;background:#181818;border-bottom:1px solid #282828}
.mi{display:flex;align-items:center;gap:10px;padding:14px;border-bottom:1px solid #222;cursor:pointer}
.mi:active{background:#1a1a1a}
.md{width:10px;height:10px;border-radius:50%;flex-shrink:0;background:#444}
.md.c{background:#0a3}
.md.p{background:#da3}
.mn{flex:1;font-size:15px}
.ma{color:#555;font-size:18px}
.eb{padding:10px 14px;background:#181818;border-bottom:1px solid #333;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.ebb{background:none;border:none;color:#0cb;font-size:15px;padding:10px 4px;min-height:44px}
.sc{padding:14px;border-bottom:1px solid #222}
.st{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:10px}
.fl{display:block;font-size:12px;color:#888;margin-bottom:4px;margin-top:10px}
.fl:first-child{margin-top:0}
.bg{display:flex;gap:6px;margin-top:6px}
.bb{flex:1;padding:10px 6px;background:#1a1a1a;border:2px solid #333;border-radius:6px;text-align:center;font-size:12px;min-height:44px;color:#ccc}
.bb.sel{border-color:#0cb;color:#0cb}
.bb:active{background:#222}
.bl{display:flex;flex-direction:column;gap:4px;margin-top:6px}
.br{display:flex;align-items:center;gap:10px;padding:10px;background:#1a1a1a;border:1px solid #333;border-radius:4px;min-height:44px;cursor:pointer}
.br:active{background:#222}
.br.ck{border-color:#0a3}
.bc{width:20px;height:20px;border:2px solid #555;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent;flex-shrink:0}
.br.ck .bc{border-color:#0a3;color:#0a3}
.mr{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.mr input{flex:1}
.sl{display:flex;flex-direction:column;gap:6px}
.sr{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#1a1a1a;border:1px solid #333;border-radius:4px;min-height:48px;cursor:pointer}
.sr:active{background:#222}
.sr.up{border-color:#0a3}
.sr.ug{border-color:#da3;opacity:.7}
.sr.er{border-color:#c33}
.si{font-size:16px;width:24px;text-align:center;flex-shrink:0}
.sn{flex:1;font-size:13px}
.sr input[type="file"]{display:none}
.pw{display:flex;flex-direction:column;align-items:center;gap:12px}
.pc{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center}
.pv{image-rendering:pixelated;border:1px solid #333;border-radius:4px}
.dl{min-width:80px;text-align:center;font-size:13px;color:#aaa}
.pm{text-align:center;color:#666;padding:20px;font-size:13px}
.pg{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:10px}
.pg canvas{image-rendering:pixelated;border:1px solid #333;border-radius:2px}
.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center;padding:20px}
.mo.open{display:flex}
.mx{background:#1a1a1a;border:1px solid #444;border-radius:8px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.mh{padding:14px 16px;border-bottom:1px solid #333;font-weight:600;color:#0cb}
.mb{padding:16px}
.mf{padding:12px 16px;border-top:1px solid #333;display:flex;gap:8px;justify-content:flex-end}
.tw{position:fixed;bottom:16px;left:16px;right:16px;z-index:200;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.tt{padding:10px 14px;background:#222;border:1px solid #444;border-radius:6px;font-size:13px;pointer-events:auto}
.tt.ok{border-color:#0a3}
.tt.er{border-color:#c33}
.ft{text-align:center;padding:8px;font-size:10px;color:#555}
</style>
</head>
<body>

<div id="vList">
  <div class="topbar">
    <h1>Island Mon Registry</h1>
    <div class="tbb">
      <button class="b bs" id="btnSettings">Settings</button>
      <button class="b bs" id="btnExport">Export</button>
    </div>
  </div>
  <div class="ls"><input type="text" id="searchIn" placeholder="Search mons..."></div>
  <div id="listC"></div>
  <div style="padding:14px">
    <button class="b bp bw" id="btnAdd">+ Add Mon</button>
    <div class="ft" id="countLabel"></div>
  </div>
</div>

<div id="vEdit" class="hide">
  <div class="eb">
    <button class="ebb" id="btnBack">&#8592; Back</button>
    <button class="b bs bd" id="btnDel">Delete</button>
  </div>
  <div id="editBody"></div>
  <div class="ft">v3.0.1</div>
</div>

<div class="mo" id="modal">
  <div class="mx">
    <div class="mh">GitHub Settings</div>
    <div class="mb">
      <label class="fl">Personal Access Token (repo scope)</label>
      <input type="password" id="ghTok" placeholder="ghp_xxxxxxxxxxxx">
      <div id="tokPrev" style="font-size:11px;color:#666;margin-top:4px"></div>
      <label class="fl">GitHub Username</label>
      <input type="text" id="ghUsr" placeholder="your-username">
      <label class="fl">Repository Name</label>
      <input type="text" id="ghRep" placeholder="island-mon-game">
      <label class="fl">Branch</label>
      <input type="text" id="ghBr" placeholder="main" value="main">
    </div>
    <div class="mf">
      <button class="b" id="btnCancel">Cancel</button>
      <button class="b bp" id="btnSave">Save</button>
    </div>
  </div>
</div>

<div class="tw" id="toasts"></div>

<script>
// Debug logging (disabled for production)
function dlog() {}

dlog('JS executing...', 1);
dlog('UA: ' + navigator.userAgent.substring(0, 60), 0);

// -- Data --
var SPRITES = ['Walk-Anim.png','Idle-Anim.png','Sleep-Anim.png','Hurt-Anim.png','Attack-Anim.png','Charge-Anim.png','Shoot-Anim.png','Strike-Anim.png','AnimData.xml'];
var BIOMES = [{id:'forest_floor',l:'Forest Floor'},{id:'canopy',l:'Canopy'},{id:'cave',l:'Cave'},{id:'riverbank',l:'Riverbank'},{id:'mountain',l:'Mountain'}];
var BEHS = [{id:'docile',l:'Docile',d:'Walk up & pet'},{id:'curious',l:'Curious',d:'Needs food/item'},{id:'aggressive',l:'Aggressive',d:'Weaken first'}];
var DIRS = ['South','SE','East','NE','North','NW','West','SW'];
var ANIMS = ['Walk','Idle','Sleep','Hurt','Attack','Charge','Shoot','Strike'];
var mons = [], selId = null, anim = null;

function ld() { try { mons = JSON.parse(localStorage.getItem('imr3')) || []; } catch(e) { mons = []; } }
function sv() { localStorage.setItem('imr3', JSON.stringify(mons)); }
function ghl() { try { return JSON.parse(localStorage.getItem('imr3g')) || {}; } catch(e) { return {}; } }
function ghs(o) { localStorage.setItem('imr3g', JSON.stringify(o)); }
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function gid() { return 'm' + Date.now() + Math.random().toString(36).substr(2, 4); }
function fld(n) { return n.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9\-]/g, ''); }
function gm(id) { for (var i = 0; i < mons.length; i++) { if (mons[i].id === id) return mons[i]; } return null; }

function isFull(m) {
  if (!m.name || !m.behavior || !m.biomes.length) return false;
  var hm = false;
  for (var i = 0; i < m.moves.length; i++) { if (m.moves[i].trim()) { hm = true; break; } }
  if (!hm) return false;
  for (var j = 0; j < SPRITES.length; j++) { if (!m.sprites || !m.sprites[SPRITES[j]]) return false; }
  return true;
}
function isPart(m) {
  if (!m.name) return false;
  if (m.behavior || m.biomes.length) return true;
  for (var i = 0; i < SPRITES.length; i++) { if (m.sprites && m.sprites[SPRITES[i]]) return true; }
  return false;
}
function dc(m) { return isFull(m) ? 'c' : isPart(m) ? 'p' : ''; }

dlog('Helpers defined', 1);

// -- Toast --
function toast(msg, ok) {
  var w = document.getElementById('toasts');
  var t = document.createElement('div');
  t.className = 'tt ' + (ok ? 'ok' : 'er');
  t.textContent = msg;
  w.appendChild(t);
  setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 3000);
}

// -- Views --
function showList() {
  document.getElementById('vList').className = '';
  document.getElementById('vEdit').className = 'hide';
  window.scrollTo(0, 0);
}
function showEdit() {
  document.getElementById('vList').className = 'hide';
  document.getElementById('vEdit').className = '';
  window.scrollTo(0, 0);
}

// -- Render list --
function renderList() {
  var q = document.getElementById('searchIn').value.toLowerCase().trim();
  var ls = [];
  for (var i = 0; i < mons.length; i++) {
    if (!q || mons[i].name.toLowerCase().indexOf(q) >= 0) ls.push(mons[i]);
  }
  var c = document.getElementById('listC');
  if (!ls.length) {
    c.innerHTML = '<div style="padding:40px;text-align:center;color:#666">No mons yet. Tap + Add Mon.</div>';
  } else {
    var h = '';
    for (var j = 0; j < ls.length; j++) {
      h += '<div class="mi" data-id="' + ls[j].id + '">';
      h += '<span class="md ' + dc(ls[j]) + '"></span>';
      h += '<span class="mn">' + esc(ls[j].name || 'Unnamed') + '</span>';
      h += '<span class="ma">&rsaquo;</span></div>';
    }
    c.innerHTML = h;
  }
  // Attach click listeners to mon items
  var items = c.querySelectorAll('.mi');
  for (var k = 0; k < items.length; k++) {
    (function(el) {
      el.addEventListener('click', function() {
        selId = el.getAttribute('data-id');
        dlog('select: ' + selId, 0);
        stopA();
        showEdit();
        renderEdit();
      });
    })(items[k]);
  }
  var tot = mons.length, comp = 0;
  for (var n = 0; n < mons.length; n++) { if (isFull(mons[n])) comp++; }
  document.getElementById('countLabel').textContent = tot + ' mons | ' + comp + ' complete | v3.0.1';
}

// -- Render editor --
function renderEdit() {
  var m = gm(selId);
  if (!m) return;
  var h = '';

  h += '<div class="sc"><div class="st">Identity</div>';
  h += '<label class="fl">Name</label>';
  h += '<input type="text" id="eName" value="' + esc(m.name) + '" placeholder="e.g. Flamegecko">';
  h += '</div>';

  h += '<div class="sc"><div class="st">Behavior</div><div class="bg">';
  for (var i = 0; i < BEHS.length; i++) {
    h += '<button class="bb' + (m.behavior === BEHS[i].id ? ' sel' : '') + '" data-beh="' + BEHS[i].id + '">' + BEHS[i].l + '<br><small style="color:#888">' + BEHS[i].d + '</small></button>';
  }
  h += '</div></div>';

  h += '<div class="sc"><div class="st">Biomes</div><div class="bl">';
  for (var j = 0; j < BIOMES.length; j++) {
    var ck = m.biomes.indexOf(BIOMES[j].id) >= 0;
    h += '<div class="br' + (ck ? ' ck' : '') + '" data-bio="' + BIOMES[j].id + '">';
    h += '<span class="bc">' + (ck ? '&#10003;' : '') + '</span>';
    h += '<span>' + BIOMES[j].l + '</span></div>';
  }
  h += '</div></div>';

  h += '<div class="sc"><div class="st">Moves</div><div id="moveList">';
  for (var k = 0; k < m.moves.length; k++) {
    h += '<div class="mr"><input type="text" value="' + esc(m.moves[k]) + '" data-mi="' + k + '" placeholder="Move ' + (k + 1) + '...">';
    h += '<button class="b bs bd" data-rmi="' + k + '">X</button></div>';
  }
  h += '</div><button class="b bs" id="btnAddMove" style="margin-top:4px">+ Add Move</button></div>';

  h += '<div class="sc"><div class="st">Notes</div>';
  h += '<textarea id="eNotes" placeholder="Lore, spawn conditions...">' + esc(m.notes) + '</textarea></div>';

h += ‘<div class="sc"><div class="st">Sprites (tap to upload)</div><div class="sl" id="spriteList">’;
for (var s = 0; s < SPRITES.length; s++) {
var up = m.sprites && m.sprites[SPRITES[s]];
h += ‘<div class="sr' + (up ? ' up' : '') + '" data-sp="' + SPRITES[s] + '">’;
h += ‘<span class="si">’ + (up ? ‘✓’ : ‘↑’) + ‘</span>’;
h += ‘<span class="sn">’ + esc(SPRITES[s]) + ‘</span>’;
h += ‘<input type="file" accept="' + (SPRITES[s].indexOf('.xml') >= 0 ? '.xml' : '.png') + '"></div>’;
}
h += ‘</div></div>’;

h += ‘<div class="sc"><div class="st">Animation Preview</div>’;
var hw = getA(m.id, ‘Walk-Anim.png’);
var hx = getA(m.id, ‘AnimData.xml’);
if (hw && hx) {
h += ‘<div class="pw"><div class="pc">’;
h += ‘<select id="animSel" style="width:auto;padding:8px">’;
for (var a = 0; a < ANIMS.length; a++) h += ‘<option value="' + ANIMS[a] + '">’ + ANIMS[a] + ‘</option>’;
h += ‘</select>’;
h += ‘<button class="b bs" id="btnDirL"><</button>’;
h += ‘<span class="dl" id="dirLbl">South</span>’;
h += ‘<button class="b bs" id="btnDirR">></button>’;
h += ‘</div><canvas id="prevC" class="pv"></canvas></div>’;
} else {
h += ‘<div class="pm">Upload Walk-Anim.png + AnimData.xml to preview</div>’;
}
h += ‘</div>’;

h += ‘<div class="sc"><div class="st">Portrait Preview</div><div style="text-align:center">’;
h += ‘<button class="b bs" id="btnPort">Upload Portrait Sheet</button>’;
h += ‘<input type="file" id="portIn" accept=".png" style="display:none">’;
h += ‘<div class="pg" id="portGrid"></div>’;
h += ‘</div></div>’;

document.getElementById(‘editBody’).innerHTML = h;

// – Attach ALL event listeners via JS –
// Name
document.getElementById(‘eName’).addEventListener(‘input’, function() {
m.name = this.value; sv();
});
// Notes
document.getElementById(‘eNotes’).addEventListener(‘input’, function() {
m.notes = this.value; sv();
});
// Behaviors
var behBtns = document.querySelectorAll(’[data-beh]’);
for (var bi = 0; bi < behBtns.length; bi++) {
(function(el) {
el.addEventListener(‘click’, function() {
m.behavior = el.getAttribute(‘data-beh’); sv(); renderEdit();
});
})(behBtns[bi]);
}
// Biomes
var bioBtns = document.querySelectorAll(’[data-bio]’);
for (var bj = 0; bj < bioBtns.length; bj++) {
(function(el) {
el.addEventListener(‘click’, function() {
var bid = el.getAttribute(‘data-bio’);
var idx = m.biomes.indexOf(bid);
if (idx >= 0) m.biomes.splice(idx, 1); else m.biomes.push(bid);
sv(); renderEdit();
});
})(bioBtns[bj]);
}
// Moves input
var mvIns = document.querySelectorAll(’[data-mi]’);
for (var mi = 0; mi < mvIns.length; mi++) {
(function(el) {
el.addEventListener(‘input’, function() {
m.moves[parseInt(el.getAttribute(‘data-mi’))] = this.value; sv();
});
})(mvIns[mi]);
}
// Move remove
var rmBtns = document.querySelectorAll(’[data-rmi]’);
for (var ri = 0; ri < rmBtns.length; ri++) {
(function(el) {
el.addEventListener(‘click’, function() {
m.moves.splice(parseInt(el.getAttribute(‘data-rmi’)), 1);
if (!m.moves.length) m.moves.push(’’);
sv(); renderEdit();
});
})(rmBtns[ri]);
}
// Add move
var amBtn = document.getElementById(‘btnAddMove’);
if (amBtn) amBtn.addEventListener(‘click’, function() { m.moves.push(’’); sv(); renderEdit(); });

// Sprites
var spRows = document.querySelectorAll(’[data-sp]’);
for (var si = 0; si < spRows.length; si++) {
(function(el) {
var fname = el.getAttribute(‘data-sp’);
var finput = el.querySelector(‘input[type=“file”]’);
el.addEventListener(‘click’, function(e) {
if (e.target === finput) return; // don’t re-trigger
dlog(’pick: ’ + fname, 0);
finput.click();
});
finput.addEventListener(‘change’, function() {
if (!this.files || !this.files[0]) return;
doUpload(m, fname, this.files[0], el);
});
})(spRows[si]);
}

// Direction buttons
var dlBtn = document.getElementById(‘btnDirL’);
var drBtn = document.getElementById(‘btnDirR’);
if (dlBtn) dlBtn.addEventListener(‘click’, function() { chgD(-1); });
if (drBtn) drBtn.addEventListener(‘click’, function() { chgD(1); });

// Anim selector
var aSel = document.getElementById(‘animSel’);
if (aSel) aSel.addEventListener(‘change’, function() { stopA(); startA(m); });

// Portrait
var pBtn = document.getElementById(‘btnPort’);
var pIn = document.getElementById(‘portIn’);
if (pBtn && pIn) {
pBtn.addEventListener(‘click’, function() { pIn.click(); });
pIn.addEventListener(‘change’, function() { doPortrait(this); });
}

// Start anim
if (hw && hx) setTimeout(function() { startA(m); }, 50);
}

// – Upload sprite –
function doUpload(m, fname, file, row) {
if (!m.name) { toast(‘Set a name first’, false); return; }
row.className = ‘sr ug’;
dlog(‘upload: ’ + fname + ’ (’ + file.size + ‘b)’, 0);

var reader = new FileReader();
reader.onload = function(e) {
var b64 = e.target.result.split(’,’)[1];
// Cache for preview
if (fname.indexOf(’.xml’) >= 0) {
var tr = new FileReader();
tr.onload = function(te) { stA(m.id, fname, te.target.result); };
tr.readAsText(file);
} else {
stA(m.id, fname, b64);
}
pushGH(m, fname, b64, row);
};
reader.onerror = function() { dlog(‘read err’, 2); row.className = ‘sr er’; };
reader.readAsDataURL(file);
}

function pushGH(m, fname, b64, row) {
var g = ghl();
if (!g.token || !g.user || !g.repo) {
toast(‘Set GitHub settings first’, false);
row.className = ‘sr er’;
return;
}
var path = ‘resources/pokemon/’ + fld(m.name) + ‘/sprites/’ + fname;
var br = g.branch || ‘main’;
var hd = { ‘Authorization’: ’token ’ + g.token, ‘Content-Type’: ‘application/json’ };
dlog(’push: ’ + path, 0);

fetch(‘https://api.github.com/repos/’ + g.user + ‘/’ + g.repo + ‘/contents/’ + path + ‘?ref=’ + br, { headers: hd })
.then(function(r) { return r.ok ? r.json() : null; })
.catch(function() { return null; })
.then(function(ex) {
var body = { message: ‘Update ’ + fname + ’ for ’ + m.name, content: b64, branch: br };
if (ex && ex.sha) body.sha = ex.sha;
return fetch(‘https://api.github.com/repos/’ + g.user + ‘/’ + g.repo + ‘/contents/’ + path, {
method: ‘PUT’, headers: hd, body: JSON.stringify(body)
});
})
.then(function(r) {
if (!r.ok) return r.json().then(function(d) { throw new Error(d.message || r.status); });
if (!m.sprites) m.sprites = {};
m.sprites[fname] = true;
sv();
row.className = ‘sr up’;
row.querySelector(’.si’).textContent = ‘\u2713’;
toast(fname + ’ committed’, true);
dlog(fname + ’ OK’, 1);
if (fname === ‘Walk-Anim.png’ || fname === ‘AnimData.xml’) {
setTimeout(function() { renderEdit(); }, 300);
}
})
.catch(function(err) {
row.className = ‘sr er’;
toast(’Failed: ’ + err.message, false);
dlog(’push fail: ’ + err.message, 2);
});
}

// – Asset cache –
function stA(mid, f, d) { try { localStorage.setItem(‘a_’ + mid + ‘*’ + f, d); } catch(e) {} }
function getA(mid, f) { return localStorage.getItem(’a*’ + mid + ‘_’ + f); }

// – Animation –
function stopA() { if (anim && anim.t) clearInterval(anim.t); anim = null; }
function startA(m) {
var cv = document.getElementById(‘prevC’);
if (!cv) return;
var ctx = cv.getContext(‘2d’);
var xd = getA(m.id, ‘AnimData.xml’);
if (!xd) return;
var sel = document.getElementById(‘animSel’);
var at = sel ? sel.value : ‘Walk’;
var sb = getA(m.id, at + ‘-Anim.png’);
if (!sb) { sb = getA(m.id, ‘Walk-Anim.png’); at = ‘Walk’; }
if (!sb) return;

var xml = new DOMParser().parseFromString(xd, ‘text/xml’);
var an = null, al = xml.querySelectorAll(‘Anim’);
for (var i = 0; i < al.length; i++) {
var nm = al[i].querySelector(‘Name’);
if (nm && nm.textContent === at) { an = al[i]; break; }
}
if (!an) an = xml.querySelector(‘Anim’);
if (!an) return;

// – Portrait –
function doPortrait(inp) {
if (!inp.files || !inp.files[0]) return;
var reader = new FileReader();
reader.onload = function(e) {
var img = new Image();
img.onload = function() {
var fs = 40, co = Math.floor(img.width / fs);
var mx = Math.min(co * Math.floor(img.height / fs), 12);
var grid = document.getElementById(‘portGrid’);
if (!grid) return;
grid.innerHTML = ‘’;
for (var i = 0; i < mx; i++) {
var c = document.createElement(‘canvas’);
c.width = fs * 3; c.height = fs * 3;
var cx = c.getContext(‘2d’);
cx.imageSmoothingEnabled = false;
cx.drawImage(img, (i % co) * fs, Math.floor(i / co) * fs, fs, fs, 0, 0, fs * 3, fs * 3);
grid.appendChild(c);
}
};
img.src = e.target.result;
};
reader.readAsDataURL(inp.files[0]);
}

// – Settings –

document.getElementById(‘ghRep’).value = g.repo || ‘’;
document.getElementById(‘ghBr’).value = g.branch || ‘main’;
var tp = document.getElementById(‘tokPrev’);
tp.textContent = (g.token && g.token.length > 8) ? g.token.substring(0, 4) + ‘…’ + g.token.substring(g.token.length - 4) : ‘’;
document.getElementById(‘modal’).classList.add(‘open’);
}

// – Export –
function doExport() {
var data = [];
for (var i = 0; i < mons.length; i++) {
var m = mons[i];
var mv = [];
for (var j = 0; j < m.moves.length; j++) { if (m.moves[j].trim()) mv.push(m.moves[j]); }
var as = {};
for (var k = 0; k < SPRITES.length; k++) as[SPRITES[k]] = !!(m.sprites && m.sprites[SPRITES[k]]);
data.push({ name: m.name, behavior: m.behavior, biomes: m.biomes, moves: mv, notes: m.notes,
spriteFolder: m.name ? ‘resources/pokemon/’ + fld(m.name) + ‘/sprites/’ : null, assets: as });
}
var blob = new Blob([JSON.stringify(data, null, 2)], { type: ‘application/json’ });
var a = document.createElement(‘a’);
a.href = URL.createObjectURL(blob); a.download = ‘mons.json’; a.click();
URL.revokeObjectURL(a.href);
toast(‘Exported ’ + data.length + ’ mons’, true);
}
